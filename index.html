<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎉 سؤال وعيدية - لعبة العيد التفاعلية</title>
    <!-- Google Fonts (Tajawal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        :root {
            --bg-primary: #f8f0e7;
            --bg-secondary: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #34495e;
            --accent-gold: #c9a23c;
            --accent-gold-light: #e8d3a9;
            --accent-green: #27ae60;
            --accent-red: #e74c3c;
            --accent-blue: #3498db;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --border-radius: 12px;
            --header-bg: linear-gradient(135deg, #c9a23c, #e8b86c);
        }

        /* الوضع الليلي */
        body.dark-mode {
            --bg-primary: #1a1e2b;
            --bg-secondary: #2a2f3f;
            --text-primary: #eaeef2;
            --text-secondary: #c0c9d5;
            --accent-gold: #e8b86c;
            --accent-gold-light: #3a3f4f;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            --header-bg: linear-gradient(135deg, #2a2f3f, #1e2537);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            min-height: 100vh;
            padding: 20px;
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* شريط التحكم العلوي */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
            padding: 15px 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: var(--header-bg);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .icon-btn {
            background: var(--bg-primary);
            border: none;
            color: var(--text-primary);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .icon-btn:hover {
            transform: scale(1.1);
            background: var(--accent-gold);
            color: white;
        }

        /* لوحة الإعدادات المنبثقة */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100vh;
            background: var(--bg-secondary);
            box-shadow: var(--shadow);
            transition: right 0.3s ease;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
            border-left: 3px solid var(--accent-gold);
        }

        .settings-panel.open {
            right: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--accent-gold);
        }

        .setting-item {
            margin-bottom: 25px;
        }

        .setting-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .setting-item input, .setting-item select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--accent-gold-light);
            border-radius: var(--border-radius);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
        }

        .players-list {
            background: var(--bg-primary);
            padding: 15px;
            border-radius: var(--border-radius);
            margin: 15px 0;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--bg-secondary);
            margin: 5px 0;
            border-radius: 8px;
        }

        .btn {
            background: var(--accent-gold);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            background: var(--accent-gold);
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* جدول النقاط */
        .scoreboard {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .scoreboard h3 {
            color: var(--accent-gold);
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid var(--accent-gold-light);
        }

        th {
            background: var(--accent-gold);
            color: white;
            font-weight: 700;
        }

        tr:hover {
            background: var(--bg-primary);
        }

        /* منطقة اللعب الرئيسية */
        .game-area {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .game-area {
                grid-template-columns: 1fr;
            }
        }

        /* بطاقة السؤال */
        .question-card {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .current-player {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent-gold);
            font-weight: 900;
        }

        .timer {
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent-gold);
            margin-bottom: 20px;
            text-shadow: var(--shadow);
        }

        .timer.warning {
            color: var(--accent-red);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .question-text {
            font-size: 1.5rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: var(--bg-primary);
            border: 2px solid var(--accent-gold-light);
            padding: 15px;
            border-radius: var(--border-radius);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-primary);
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            background: var(--accent-gold);
            color: white;
            border-color: var(--accent-gold);
            transform: scale(1.05);
        }

        .option-btn.correct {
            background: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
        }

        .option-btn.wrong {
            background: var(--accent-red);
            color: white;
            border-color: var(--accent-red);
        }

        .option-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* العجلة */
        .wheel-card {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #c9a23c 0deg 72deg,
                #e8b86c 72deg 144deg,
                #d4af37 144deg 216deg,
                #e8d3a9 216deg 288deg,
                #c9a23c 288deg 360deg
            );
            position: relative;
            transition: transform 3s cubic-bezier(0.25, 0.1, 0.15, 1);
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .wheel::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            border: 3px solid var(--accent-gold);
        }

        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid var(--accent-red);
            filter: drop-shadow(var(--shadow));
        }

        .wheel-sections {
            margin-top: 20px;
            padding: 15px;
            background: var(--bg-primary);
            border-radius: var(--border-radius);
        }

        .section-input {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .section-input input {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--accent-gold-light);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        /* مؤشر الدور */
        .turn-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-gold);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 700;
            box-shadow: var(--shadow);
            z-index: 100;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                bottom: -100px;
            }
            to {
                bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الشريط العلوي -->
        <div class="top-bar">
            <div class="logo">
                <i class="fas fa-gift"></i> سؤال وعيدية
            </div>
            <div class="controls">
                <button class="icon-btn" id="soundSettingsBtn" title="إعدادات الصوت">
                    <i class="fas fa-music"></i>
                </button>
                <button class="icon-btn" id="themeToggle" title="الوضع الليلي/النهاري">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="icon-btn" id="settingsBtn" title="الإعدادات">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>

        <!-- جدول النقاط -->
        <div class="scoreboard">
            <h3><i class="fas fa-trophy"></i> لوحة الشرف</h3>
            <table id="scoreTable">
                <thead>
                    <tr>
                        <th>اللاعب</th>
                        <th>المبالغ (ريال)</th>
                        <th>النقاط</th>
                        <th>الترتيب</th>
                    </tr>
                </thead>
                <tbody id="scoreBody">
                    <!-- يتم ملؤها عبر JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- منطقة اللعب -->
        <div class="game-area">
            <!-- قسم الأسئلة -->
            <div class="question-card">
                <div class="current-player" id="currentPlayerDisplay">
                    دور: -
                </div>
                <div class="timer" id="timer">30</div>
                <div class="question-text" id="questionText">
                    اضغط ابدأ للعب
                </div>
                <div class="options" id="optionsContainer">
                    <!-- الخيارات تضاف هنا -->
                </div>
            </div>

            <!-- قسم العجلة -->
            <div class="wheel-card">
                <h3><i class="fas fa-wheelchair"></i> عجلة الحظ</h3>
                <div class="wheel-container">
                    <div class="wheel" id="wheel" onclick="spinWheel()"></div>
                    <div class="wheel-pointer"></div>
                </div>
                <div class="wheel-sections" id="wheelSections">
                    <!-- أقسام العجلة تضاف هنا -->
                </div>
                <button class="btn" id="updateWheelBtn" onclick="updateWheelSections()" style="margin-top: 15px;">
                    <i class="fas fa-save"></i> تحديث العجلة
                </button>
            </div>
        </div>
    </div>

    <!-- لوحة الإعدادات المنبثقة -->
    <div class="overlay" id="overlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h2><i class="fas fa-cog"></i> الإعدادات</h2>
            <button class="icon-btn" onclick="closeSettings()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- إعداد الوقت -->
        <div class="setting-item">
            <label><i class="fas fa-clock"></i> وقت الإجابة (ثانية):</label>
            <input type="number" id="timeSetting" min="5" max="60" value="30">
            <small>يتم التطبيق عند بداية اللعبة</small>
        </div>

        <!-- إدارة الأسماء -->
        <div class="setting-item">
            <label><i class="fas fa-users"></i> إضافة لاعب:</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="playerName" placeholder="اسم اللاعب">
                <button class="btn" onclick="addPlayer()" style="width: auto;">إضافة</button>
            </div>
            <div class="players-list" id="playersList"></div>
        </div>

        <!-- تعديل العجلة -->
        <div class="setting-item">
            <label><i class="fas fa-pencil-alt"></i> تعديل أقسام العجلة:</label>
            <div id="wheelSettings">
                <!-- تضاف حقول العجلة هنا -->
            </div>
        </div>

        <!-- التحكم بالصوت -->
        <div class="setting-item">
            <label><i class="fas fa-volume-up"></i> مستوى الصوت:</label>
            <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="0.7">
        </div>
        <div class="setting-item">
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="toggleMusic()" style="width: auto;">تشغيل/إيقاف الموسيقى</button>
                <button class="btn" onclick="toggleEffects()" style="width: auto;">تشغيل/إيقاف المؤثرات</button>
            </div>
        </div>

        <!-- أزرار إضافية -->
        <div class="setting-item">
            <button class="btn" onclick="resetData()"><i class="fas fa-trash"></i> تصفير البيانات</button>
        </div>
        <div class="setting-item">
            <button class="btn" onclick="startGame()"><i class="fas fa-play"></i> ابدأ اللعبة</button>
        </div>
    </div>

    <!-- مؤشر الدور المتحرك -->
    <div class="turn-indicator" id="turnIndicator" style="display: none;">
        <i class="fas fa-arrow-left"></i> دور: <span id="turnPlayerName"></span>
    </div>

    <!-- عناصر الصوت المخفية -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="clickSound">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>
    <audio id="spinSound">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mpeg">
    </audio>
    <audio id="correctSound">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" type="audio/mpeg">
    </audio>
    <audio id="wrongSound">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3" type="audio/mpeg">
    </audio>
    <audio id="winSound">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3" type="audio/mpeg">
    </audio>
    <audio id="turnSound">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3" type="audio/mpeg">
    </audio>
    <audio id="menuSound">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script>
        // متغيرات اللعبة الرئيسية
        let players = [];
        let currentPlayerIndex = 0;
        let scores = {};
        let totalEarnings = {};
        let usedQuestions = [];
        let currentQuestion = null;
        let timerInterval = null;
        let timeLeft = 30;
        let timeSetting = 30;
        let isSpinning = false;
        let wheelSections = [5, 10, 50, 100, 500];
        let soundEnabled = true;
        let musicEnabled = true;
        let effectsEnabled = true;
        let volume = 0.7;

        // عناصر الصوت
        const bgMusic = document.getElementById('bgMusic');
        const clickSound = document.getElementById('clickSound');
        const spinSound = document.getElementById('spinSound');
        const correctSound = document.getElementById('correctSound');
        const wrongSound = document.getElementById('wrongSound');
        const winSound = document.getElementById('winSound');
        const turnSound = document.getElementById('turnSound');
        const menuSound = document.getElementById('menuSound');

        // ضبط مستوى الصوت
        function setVolume(vol) {
            volume = vol;
            [bgMusic, clickSound, spinSound, correctSound, wrongSound, winSound, turnSound, menuSound].forEach(audio => {
                audio.volume = vol;
            });
        }

        // تشغيل صوت التفاعل
        function playSound(sound, isEffect = true) {
            if (isEffect && !effectsEnabled) return;
            if (!isEffect && !musicEnabled) return;
            sound.currentTime = 0;
            sound.play().catch(e => console.log('صوت متوقف:', e));
        }

        // إيقاف/تشغيل الموسيقى
        function toggleMusic() {
            musicEnabled = !musicEnabled;
            if (musicEnabled) {
                bgMusic.play();
            } else {
                bgMusic.pause();
            }
            playSound(clickSound);
        }

        // إيقاف/تشغيل المؤثرات
        function toggleEffects() {
            effectsEnabled = !effectsEnabled;
            playSound(clickSound);
        }

        // الأسئلة
        const questions = [
            {
                question: "ما هي السورة التي تسمى قلب القرآن؟",
                options: ["يس", "الرحمن", "الواقعة", "الملك"],
                correct: 0
            },
            {
                question: "كم عدد ألوان قوس قزح؟",
                options: ["5", "6", "7", "8"],
                correct: 2
            },
            {
                question: "ما هو أكبر محيط في العالم؟",
                options: ["الأطلسي", "الهادئ", "الهندي", "المتجمد"],
                correct: 1
            },
            {
                question: "في أي عام توحدت المملكة العربية السعودية؟",
                options: ["1932", "1922", "1942", "1912"],
                correct: 0
            },
            {
                question: "ما هي عاصمة إيطاليا؟",
                options: ["ميلان", "روما", "البندقية", "نابولي"],
                correct: 1
            },
            {
                question: "كم عدد أحرف اللغة العربية؟",
                options: ["26", "27", "28", "29"],
                correct: 2
            },
            {
                question: "من هو النبي الذي ابتلعه الحوت؟",
                options: ["موسى", "يونس", "إبراهيم", "نوح"],
                correct: 1
            },
            {
                question: "ما هو أسرع حيوان بري؟",
                options: ["الأسد", "النمر", "الفهد", "الغزال"],
                correct: 2
            },
            {
                question: "كم مرة ذكرت كلمة 'الجنة' في القرآن؟",
                options: ["66", "77", "88", "99"],
                correct: 1
            },
            {
                question: "من هو مؤسس علم الجبر؟",
                options: ["الخوارزمي", "ابن سينا", "الفارابي", "ابن رشد"],
                correct: 0
            }
        ]; // يمكن إضافة 20 سؤالاً آخر بنفس النمط

        // تحميل البيانات من localStorage
        function loadFromStorage() {
            const savedPlayers = localStorage.getItem('players');
            const savedScores = localStorage.getItem('scores');
            const savedEarnings = localStorage.getItem('earnings');
            
            if (savedPlayers) players = JSON.parse(savedPlayers);
            if (savedScores) scores = JSON.parse(savedScores);
            if (savedEarnings) totalEarnings = JSON.parse(savedEarnings);
            
            updatePlayersList();
            updateScoreboard();
        }

        // حفظ البيانات في localStorage
        function saveToStorage() {
            localStorage.setItem('players', JSON.stringify(players));
            localStorage.setItem('scores', JSON.stringify(scores));
            localStorage.setItem('earnings', JSON.stringify(totalEarnings));
        }

        // إضافة لاعب جديد
        function addPlayer() {
            const nameInput = document.getElementById('playerName');
            const name = nameInput.value.trim();
            
            if (name && !players.includes(name)) {
                players.push(name);
                scores[name] = 0;
                totalEarnings[name] = 0;
                nameInput.value = '';
                updatePlayersList();
                updateScoreboard();
                saveToStorage();
                playSound(clickSound);
            }
        }

        // تحديث قائمة اللاعبين
        function updatePlayersList() {
            const list = document.getElementById('playersList');
            list.innerHTML = '';
            players.forEach(player => {
                const div = document.createElement('div');
                div.className = 'player-item';
                div.innerHTML = `
                    <span>${player}</span>
                    <button onclick="removePlayer('${player}')" style="background: none; border: none; color: var(--accent-red); cursor: pointer;">
                        <i class="fas fa-trash"></i>
                    </button>
                `;
                list.appendChild(div);
            });
        }

        // حذف لاعب
        function removePlayer(player) {
            players = players.filter(p => p !== player);
            delete scores[player];
            delete totalEarnings[player];
            updatePlayersList();
            updateScoreboard();
            saveToStorage();
            playSound(clickSound);
        }

        // تحديث جدول النقاط
        function updateScoreboard() {
            const tbody = document.getElementById('scoreBody');
            tbody.innerHTML = '';
            
            const sorted = [...players].sort((a, b) => (totalEarnings[b] || 0) - (totalEarnings[a] || 0));
            
            sorted.forEach((player, index) => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${player}</td>
                    <td>${totalEarnings[player] || 0} ريال</td>
                    <td>${scores[player] || 0} نقطة</td>
                    <td>${index + 1} ${index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : ''}</td>
                `;
            });
        }

        // بدء اللعبة
        function startGame() {
            if (players.length === 0) {
                alert('الرجاء إضافة لاعبين أولاً');
                return;
            }
            
            // اختيار لاعب عشوائي للبدء
            currentPlayerIndex = Math.floor(Math.random() * players.length);
            usedQuestions = [];
            timeSetting = parseInt(document.getElementById('timeSetting').value);
            timeLeft = timeSetting;
            
            // إخفاء لوحة الإعدادات
            closeSettings();
            
            // بدء أول سؤال
            nextTurn();
            playSound(clickSound);
        }

        // الدور التالي
        function nextTurn() {
            // إظهار مؤشر الدور
            const turnIndicator = document.getElementById('turnIndicator');
            const turnPlayerName = document.getElementById('turnPlayerName');
            turnPlayerName.textContent = players[currentPlayerIndex];
            turnIndicator.style.display = 'block';
            
            // تحديث العرض
            document.getElementById('currentPlayerDisplay').innerHTML = `<i class="fas fa-user"></i> دور: ${players[currentPlayerIndex]}`;
            
            // تشغيل صوت تبديل الدور
            playSound(turnSound);
            
            // جلب سؤال جديد غير مكرر
            loadNewQuestion();
            
            // بدء المؤقت
            startTimer();
        }

        // تحميل سؤال جديد
        function loadNewQuestion() {
            const availableQuestions = questions.filter((q, index) => !usedQuestions.includes(index));
            
            if (availableQuestions.length === 0) {
                document.getElementById('questionText').textContent = '🎉 تهانينا! لقد أكملتم جميع الأسئلة';
                document.getElementById('optionsContainer').innerHTML = '';
                return;
            }
            
            const randomIndex = Math.floor(Math.random() * availableQuestions.length);
            const questionIndex = questions.indexOf(availableQuestions[randomIndex]);
            usedQuestions.push(questionIndex);
            currentQuestion = questions[questionIndex];
            
            // عرض السؤال والخيارات
            document.getElementById('questionText').textContent = currentQuestion.question;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            currentQuestion.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }

        // بدء المؤقت
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            timeLeft = timeSetting;
            const timerElement = document.getElementById('timer');
            timerElement.textContent = timeLeft;
            timerElement.classList.remove('warning');
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft;
                
                if (timeLeft <= 5) {
                    timerElement.classList.add('warning');
                }
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout();
                }
            }, 1000);
        }

        // معالجة انتهاء الوقت
        function handleTimeout() {
            playSound(wrongSound);
            
            // تعطيل الأزرار
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.disabled = true;
            });
            
            // الانتقال للاعب التالي بعد ثانية
            setTimeout(() => {
                nextPlayer();
            }, 1000);
        }

        // التحقق من الإجابة
        function checkAnswer(selectedIndex) {
            clearInterval(timerInterval);
            
            const buttons = document.querySelectorAll('.option-btn');
            
            if (selectedIndex === currentQuestion.correct) {
                // إجابة صحيحة
                buttons[selectedIndex].classList.add('correct');
                playSound(correctSound);
                
                // زيادة النقاط
                scores[players[currentPlayerIndex]] += 10;
                updateScoreboard();
                saveToStorage();
                
                // تفعيل العجلة
                document.getElementById('wheel').style.pointerEvents = 'auto';
                
                // تعطيل الأزرار
                buttons.forEach(btn => btn.disabled = true);
            } else {
                // إجابة خاطئة
                buttons[selectedIndex].classList.add('wrong');
                buttons[currentQuestion.correct].classList.add('correct');
                playSound(wrongSound);
                
                // تعطيل الأزرار
                buttons.forEach(btn => btn.disabled = true);
                
                // الانتقال للاعب التالي بعد ثانية
                setTimeout(() => {
                    nextPlayer();
                }, 1500);
            }
        }

        // الانتقال للاعب التالي
        function nextPlayer() {
            currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            nextTurn();
        }

        // تدوير العجلة
        function spinWheel() {
            if (isSpinning) return;
            
            const wheel = document.getElementById('wheel');
            isSpinning = true;
            
            playSound(spinSound);
            
            // دوران عشوائي
            const spins = Math.floor(Math.random() * 5) + 5;
            const degrees = spins * 360 + Math.floor(Math.random() * 360);
            wheel.style.transform = `rotate(${degrees}deg)`;
            
            // تحديد الجائزة بعد التوقف
            setTimeout(() => {
                isSpinning = false;
                const segment = Math.floor(Math.random() * wheelSections.length);
                const prize = wheelSections[segment];
                
                // إضافة الجائزة للاعب
                totalEarnings[players[currentPlayerIndex]] += prize;
                scores[players[currentPlayerIndex]] += 25; // مكافأة إضافية
                
                // تحديث الجدول
                updateScoreboard();
                saveToStorage();
                
                // تأثير confetti
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 }
                });
                
                // صوت الفوز
                playSound(winSound);
                
                // إظهار رسالة الفوز
                alert(`🎉 ${players[currentPlayerIndex]} فاز بـ ${prize} ريال!`);
                
                // تعطيل العجلة مؤقتاً
                wheel.style.pointerEvents = 'none';
                
                // الانتقال للاعب التالي بعد الفوز
                setTimeout(() => {
                    nextPlayer();
                }, 2000);
            }, 3000);
        }

        // تحديث أقسام العجلة
        function updateWheelSections() {
            const inputs = document.querySelectorAll('.section-input input');
            wheelSections = [];
            
            inputs.forEach(input => {
                const val = parseInt(input.value);
                if (!isNaN(val) && val > 0) {
                    wheelSections.push(val);
                }
            });
            
            // تحديث عرض العجلة
            updateWheelDisplay();
            playSound(clickSound);
            saveToStorage();
        }

        // تحديث عرض العجلة
        function updateWheelDisplay() {
            const sectionsDiv = document.getElementById('wheelSections');
            sectionsDiv.innerHTML = '<h4>أقسام العجلة:</h4>';
            
            wheelSections.forEach((section, index) => {
                const div = document.createElement('div');
                div.className = 'section-input';
                div.innerHTML = `
                    <input type="number" value="${section}" min="1" step="1">
                `;
                sectionsDiv.appendChild(div);
            });
        }

        // فتح/إغلاق الإعدادات
        function openSettings() {
            document.getElementById('settingsPanel').classList.add('open');
            document.getElementById('overlay').classList.add('active');
            playSound(menuSound);
            
            // تحضير إعدادات العجلة
            const wheelSettings = document.getElementById('wheelSettings');
            wheelSettings.innerHTML = '';
            wheelSections.forEach((section, index) => {
                const div = document.createElement('div');
                div.className = 'section-input';
                div.innerHTML = `
                    <label>قسم ${index + 1}:</label>
                    <input type="number" value="${section}" min="1" step="1">
                `;
                wheelSettings.appendChild(div);
            });
        }

        function closeSettings() {
            document.getElementById('settingsPanel').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
            playSound(menuSound);
        }

        // تصفير البيانات
        function resetData() {
            if (confirm('هل أنت متأكد من تصفير جميع البيانات؟')) {
                players = [];
                scores = {};
                totalEarnings = {};
                usedQuestions = [];
                localStorage.clear();
                updatePlayersList();
                updateScoreboard();
                playSound(clickSound);
            }
        }

        // تبديل الوضع الليلي
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('#themeToggle i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
            playSound(clickSound);
        }

        // التهيئة
        window.onload = function() {
            loadFromStorage();
            updateWheelDisplay();
            
            // إعداد مستمعي الأحداث
            document.getElementById('soundSettingsBtn').onclick = openSettings;
            document.getElementById('settingsBtn').onclick = openSettings;
            document.getElementById('overlay').onclick = closeSettings;
            document.getElementById('themeToggle').onclick = toggleTheme;
            document.getElementById('volumeControl').oninput = (e) => setVolume(e.target.value);
            
            // محاولة تشغيل الموسيقى عند أول تفاعل
            document.body.addEventListener('click', function initMusic() {
                if (musicEnabled) {
                    bgMusic.play().catch(() => {});
                }
                document.body.removeEventListener('click', initMusic);
            }, { once: true });
        };
    </script>
</body>
</html>
