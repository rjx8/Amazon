<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مسابقة المستويات | أسئلة سهلة، متوسطة، صعبة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', 'Segoe UI', 'Cairo', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #10141e 0%, #1a1f2c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        /* الحاوية الرئيسية */
        .app-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            padding: 1.8rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        /* الشاشات */
        .screen {
            transition: 0.2s;
        }

        .hidden {
            display: none;
        }

        /* عنوان رئيسي */
        .main-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F9F3E2, #FFD89C);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .sub {
            text-align: center;
            color: #9aa4bf;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            border-bottom: 1px dashed #2e3a55;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 0.5rem;
        }

        /* بطاقات المستويات */
        .levels-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin: 2rem 0;
        }

        .level-card {
            background: rgba(20, 28, 40, 0.8);
            border-radius: 2rem;
            padding: 1.2rem 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 215, 140, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
        }

        .level-card:hover:not(.completed-level) {
            transform: translateY(-4px);
            background: rgba(35, 45, 70, 0.9);
            border-color: #ffb347;
            box-shadow: 0 15px 25px -8px black;
        }

        .level-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .level-name {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .level-badge {
            font-size: 0.75rem;
            background: #2a3348;
            width: fit-content;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            color: #bfc9e6;
        }

        .level-status {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .completed-level .level-name {
            text-decoration: line-through;
            text-decoration-thickness: 3px;
            text-decoration-color: #ffb347;
            opacity: 0.7;
        }

        .completed-level {
            opacity: 0.7;
            filter: grayscale(0.1);
            cursor: default;
            background: #11161f;
            border-color: #3e3f4e;
        }

        /* سهولة تحديد الألوان */
        .easy .level-name { color: #6fcf97; }
        .medium .level-name { color: #f2c94c; }
        .hard .level-name { color: #eb5757; }

        /* شاشة الأسئلة */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #0f1420cc;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .level-title {
            font-size: 1.6rem;
            font-weight: bold;
            background: linear-gradient(120deg, #FFD966, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .question-counter {
            background: #1e2a3a;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .question-box {
            background: #0b0f18b3;
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            margin: 1.5rem 0;
            border: 1px solid #2c354b;
            backdrop-filter: blur(8px);
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 2rem;
            color: #f3f6ff;
            text-align: center;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option-btn {
            background: #1e2538;
            border: 1px solid #2f3a55;
            border-radius: 60px;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            text-align: right;
            color: #e2e9ff;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option-btn:hover:not(.selected-option) {
            background: #2d374f;
            border-color: #ffb347;
            transform: translateX(-4px);
        }

        .selected-option {
            background: #3c4b6e;
            border-color: #ffc107;
            color: white;
            box-shadow: 0 0 0 2px #ffb34780;
        }

        .feedback {
            margin: 1.2rem 0 1rem;
            padding: 0.8rem;
            border-radius: 40px;
            text-align: center;
            font-weight: 500;
            background: #03060e80;
            font-size: 1rem;
        }

        .correct-feedback {
            color: #a3e4b0;
            border-right: 4px solid #2ecc71;
            background: #1a2a1f80;
        }

        .wrong-feedback {
            color: #f4acb7;
            border-right: 4px solid #e74c3c;
            background: #2c1b1f80;
        }

        .quiz-actions {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
        }

        button {
            background: #2a344b;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            color: #f0f3fc;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button.primary {
            background: linear-gradient(95deg, #f39c12, #e67e22);
            color: #1e1a0c;
            box-shadow: 0 5px 12px #e67e2250;
        }

        button.primary:hover {
            transform: scale(0.97);
            background: linear-gradient(95deg, #e67e22, #f39c12);
        }

        button.secondary {
            background: #20273e;
            border: 1px solid #4a5a7c;
        }

        button.secondary:hover {
            background: #2f3857;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .reset-btn {
            background: none;
            border: 1px solid #ff9966;
            color: #ffb366;
            margin-top: 1rem;
            width: 100%;
            justify-content: center;
        }

        hr {
            border-color: #2a324b;
            margin: 1rem 0;
        }

        @media (max-width: 550px) {
            .app-container {
                padding: 1rem;
            }
            .question-text {
                font-size: 1.2rem;
            }
            .level-name {
                font-size: 1.3rem;
            }
            .option-btn {
                padding: 0.8rem 1rem;
                font-size: 0.85rem;
            }
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #5f6c8f;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- شاشة القائمة الرئيسية -->
    <div id="menuScreen" class="screen">
        <div class="main-title">🏆 تحدي المعرفة 🧠</div>
        <div style="text-align: center;" class="sub">اختر مستواك وأجب عن 10 أسئلة فريدة</div>
        <div class="levels-grid" id="levelsContainer"></div>
        <button class="reset-btn" id="resetAllBtn">⟳ إعادة تعيين كل المستويات</button>
        <footer>✨ كل مستوى يحتوي على 10 أسئلة غير متكررة ✨</footer>
    </div>

    <!-- شاشة اللعب (الأسئلة) -->
    <div id="gameScreen" class="screen hidden">
        <div class="quiz-header">
            <span class="level-title" id="gameLevelName">المستوى السهل</span>
            <span class="question-counter" id="questionCounter">السؤال 1 / 10</span>
        </div>
        <div class="question-box">
            <div class="question-text" id="questionText">جارٍ التحميل...</div>
            <div class="options-list" id="optionsContainer"></div>
            <div class="feedback" id="feedbackMsg"></div>
        </div>
        <div class="quiz-actions">
            <button id="backToMenuBtn" class="secondary">🏠 القائمة الرئيسية</button>
            <button id="nextQuestionBtn" class="primary">▶ السؤال التالي</button>
        </div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    //  المستويات الثلاثة: كل مستوى 10 أسئلة (سهل، متوسط، صعب)
    // --------------------------------------------------------------
    const QUESTIONS_DB = {
        easy: [
            { text: "ما هي عاصمة المملكة العربية السعودية؟", options: ["جدة", "الرياض", "مكة المكرمة", "الدمام"], correct: 1 },
            { text: "كم عدد أركان الإسلام؟", options: ["أربعة", "خمسة", "ستة", "سبعة"], correct: 1 },
            { text: "ما هو أكبر محيط في العالم؟", options: ["الأطلسي", "الهندي", "المتجمد الشمالي", "الهادئ"], correct: 3 },
            { text: "من هو مؤسس شركة مايكروسوفت؟", options: ["ستيف جوبز", "مارك زوكربيرغ", "بيل غيتس", "جيف بيزوس"], correct: 2 },
            { text: "ما لون دم الحبار؟", options: ["أحمر", "أزرق", "أخضر", "أصفر"], correct: 1 },
            { text: "ما اسم العملة الرسمية في مصر؟", options: ["الريال", "الدينار", "الجنيه", "الدرهم"], correct: 2 },
            { text: "أطول نهر في العالم هو؟", options: ["الأمازون", "النيل", "اليانغتسي", "المسيسيبي"], correct: 1 },
            { text: "من هو النبي الذي ابتلعه الحوت؟", options: ["موسى", "يونس", "إبراهيم", "يوسف"], correct: 1 },
            { text: "ماذا يسمى صوت الأسد؟", options: ["زئير", "نعيق", "صهيل", "خوار"], correct: 0 },
            { text: "كم عدد الكواكب في المجموعة الشمسية؟", options: ["7", "8", "9", "10"], correct: 1 }
        ],
        medium: [
            { text: "من هو أول ملك للسعودية؟", options: ["الملك سعود", "الملك فيصل", "الملك عبدالعزيز", "الملك خالد"], correct: 2 },
            { text: "ما هي أقرب كوكب إلى الشمس؟", options: ["الزهرة", "عطارد", "الأرض", "المريخ"], correct: 1 },
            { text: "كم عدد عظام الجمجمة البشرية؟", options: ["22", "26", "20", "24"], correct: 0 },
            { text: "من كاتب رواية 'مئة عام من العزلة'؟", options: ["غابرييل غارسيا ماركيز", "إرنست هيمنغواي", "نجيب محفوظ", "جورج أورويل"], correct: 0 },
            { text: "ما هي أكبر صحراء حارة في العالم؟", options: ["الصحراء الكبرى", "صحراء الربع الخالي", "صحراء جوبي", "صحراء كالاهاري"], correct: 0 },
            { text: "ما هي السورة التي تسمى 'قلب القرآن'؟", options: ["الفاتحة", "الإخلاص", "يس", "الرحمن"], correct: 2 },
            { text: "في أي عام انتهت الحرب العالمية الثانية؟", options: ["1943", "1944", "1945", "1946"], correct: 2 },
            { text: "من هو مكتشف الجاذبية الأرضية؟", options: ["نيوتن", "أينشتاين", "جاليليو", "كوبرنيكوس"], correct: 0 },
            { text: "ما هي أطول سلسلة جبلية في العالم؟", options: ["الهملايا", "جبال الأنديز", "جبال روكي", "جبال الألب"], correct: 1 },
            { text: "ما اسم جهاز قياس الزلازل؟", options: ["بارومتر", "سيسموغراف", "مقياس الحرارة", "أنيمومتر"], correct: 1 }
        ],
        hard: [
            { text: "من هو العالم الذي وضع قانون الجذب العام؟", options: ["باسكال", "كبلر", "نيوتن", "أرخميدس"], correct: 2 },
            { text: "كم عدد السور المكية في القرآن الكريم؟", options: ["82", "86", "88", "90"], correct: 1 },
            { text: "من أول من استخدم الخيول في المعارك؟", options: ["الفرس", "الرومان", "اليونانيون", "المصريون"], correct: 0 },
            { text: "ما هي أعمق نقطة في المحيطات؟", options: ["خندق ماريانا", "خندق بورتوريكو", "خندق اليابان", "خندق تونغا"], correct: 0 },
            { text: "من هو مؤسس علم المنطق الحديث؟", options: ["أرسطو", "سقراط", "فيثاغورس", "أفلاطون"], correct: 0 },
            { text: "ما هي أكبر غدة في جسم الإنسان؟", options: ["البنكرياس", "الكبد", "الغدة الدرقية", "الغدة النخامية"], correct: 1 },
            { text: "من هو الخليفة الأموي الذي أسس مدينة قرطبة؟", options: ["عبدالرحمن الداخل", "الوليد بن عبدالملك", "هشام بن عبدالملك", "عمر بن عبدالعزيز"], correct: 0 },
            { text: "ما هي العملة الرسمية لدولة سويسرا؟", options: ["اليورو", "الفرنك السويسري", "الدولار", "الجنيه الإسترليني"], correct: 1 },
            { text: "من هو مكتشف الدورة الدموية الصغرى؟", options: ["ابن النفيس", "جالينوس", "ابن سينا", "ويليام هارفي"], correct: 0 },
            { text: "كم تبلغ سرعة الضوء في الثانية تقريباً (كم/ث)؟", options: ["300 ألف", "150 ألف", "400 ألف", "500 ألف"], correct: 0 }
        ]
    };

    // حالة المستويات (مكتمل / غير مكتمل)
    let levelsCompletion = {
        easy: false,
        medium: false,
        hard: false
    };

    // بيانات اللعب الحالية
    let activeLevel = null;          // 'easy', 'medium', 'hard'
    let shuffledQuestions = [];       // نسخة مختلطة من الأسئلة
    let currentQIndex = 0;           // السؤال الحالي (0-based)
    let selectedAnswerIndex = null;   // الخيار المختار حالياً (رقم الخيار)
    let waitingForNext = false;       // لمنع التكرار أثناء الانتقال
    let currentQuestionObj = null;

    // عناصر DOM
    const menuScreen = document.getElementById('menuScreen');
    const gameScreen = document.getElementById('gameScreen');
    const levelsContainer = document.getElementById('levelsContainer');
    const resetAllBtn = document.getElementById('resetAllBtn');
    const backToMenuBtn = document.getElementById('backToMenuBtn');
    const nextQuestionBtn = document.getElementById('nextQuestionBtn');
    const gameLevelNameSpan = document.getElementById('gameLevelName');
    const questionCounterSpan = document.getElementById('questionCounter');
    const questionTextDiv = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedbackMsgDiv = document.getElementById('feedbackMsg');

    // دالة خلط عشوائي (Fisher-Yates)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // بناء القائمة الرئيسية ديناميكياً
    function renderMenu() {
        const levelsData = [
            { id: 'easy', name: '📘 سهل', badge: '10 أسئلة بسيطة', class: 'easy' },
            { id: 'medium', name: '📙 متوسط', badge: '10 أسئلة متنوعة', class: 'medium' },
            { id: 'hard', name: '📕 صعب', badge: '10 أسئلة متقدمة', class: 'hard' }
        ];

        levelsContainer.innerHTML = '';
        levelsData.forEach(level => {
            const isCompleted = levelsCompletion[level.id];
            const card = document.createElement('div');
            card.className = `level-card ${level.class} ${isCompleted ? 'completed-level' : ''}`;
            if (!isCompleted) {
                card.style.cursor = 'pointer';
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    startLevel(level.id);
                });
            } else {
                card.style.cursor = 'default';
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showToastMessage(`✅ المستوى ${level.name} مكتمل! لا يمكن تكرار الأسئلة.`, '#ffb347');
                });
            }

            const infoDiv = document.createElement('div');
            infoDiv.className = 'level-info';
            infoDiv.innerHTML = `
                <div class="level-name">${level.name}</div>
                <div class="level-badge">${level.badge}</div>
            `;
            const statusSpan = document.createElement('div');
            statusSpan.className = 'level-status';
            statusSpan.innerText = isCompleted ? '✔️ مكتمل' : '🎯 جاهز';
            if (isCompleted) statusSpan.style.textDecoration = 'line-through';
            card.appendChild(infoDiv);
            card.appendChild(statusSpan);
            levelsContainer.appendChild(card);
        });
    }

    // عرض رسالة مؤقتة (بديل تنبيه)
    function showToastMessage(msg, color = '#f39c12') {
        const existingToast = document.querySelector('.custom-toast');
        if(existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'custom-toast';
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = '#1e1f2c';
        toast.style.color = '#ffde9e';
        toast.style.padding = '0.8rem 1.5rem';
        toast.style.borderRadius = '40px';
        toast.style.borderRight = `5px solid ${color}`;
        toast.style.fontWeight = 'bold';
        toast.style.zIndex = '999';
        toast.style.boxShadow = '0 5px 15px black';
        toast.style.backdropFilter = 'blur(12px)';
        document.body.appendChild(toast);
        setTimeout(() => { toast.remove(); }, 2200);
    }

    // بدء مستوى معين (تحضير الأسئلة وتجهيز الجلسة)
    function startLevel(levelId) {
        if (levelsCompletion[levelId]) {
            showToastMessage(`🚫 هذا المستوى مكتمل بالفعل! تم الشطب عليه.`, '#e67e22');
            return;
        }

        // استيراد الأسئلة من قاعدة البيانات
        let questionsSource = [];
        if (levelId === 'easy') questionsSource = [...QUESTIONS_DB.easy];
        else if (levelId === 'medium') questionsSource = [...QUESTIONS_DB.medium];
        else questionsSource = [...QUESTIONS_DB.hard];

        if (questionsSource.length !== 10) console.warn("عدد الأسئلة ليس 10!");
        
        // خلط الأسئلة لضمان عدم تكرار بنفس الترتيب (ولكن القائمة كلها فريدة)
        shuffledQuestions = shuffleArray([...questionsSource]);
        activeLevel = levelId;
        currentQIndex = 0;
        selectedAnswerIndex = null;
        waitingForNext = false;
        
        // إعادة تعيين واجهة اللعب
        feedbackMsgDiv.innerHTML = '';
        feedbackMsgDiv.className = 'feedback';
        // عرض السؤال الأول
        renderCurrentQuestion();
        
        // تبديل الشاشات
        menuScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        // تحديث اسم المستوى في الأعلى
        let levelDisplayName = '';
        if (levelId === 'easy') levelDisplayName = '📘 المستوى السهل';
        else if (levelId === 'medium') levelDisplayName = '📙 المستوى المتوسط';
        else levelDisplayName = '📕 المستوى الصعب';
        gameLevelNameSpan.innerText = levelDisplayName;
    }

    // عرض السؤال الحالي بناءً على index
    function renderCurrentQuestion() {
        if (!shuffledQuestions.length || currentQIndex >= shuffledQuestions.length) {
            // انتهت الأسئلة بشكل غير متوقع -> إنهاء
            finishLevel();
            return;
        }
        currentQuestionObj = shuffledQuestions[currentQIndex];
        questionTextDiv.innerText = currentQuestionObj.text;
        // عرض الخيارات
        optionsContainer.innerHTML = '';
        currentQuestionObj.options.forEach((opt, idx) => {
            const optBtn = document.createElement('div');
            optBtn.className = 'option-btn';
            optBtn.innerText = `${String.fromCharCode(65+idx)}- ${opt}`;  // أ، ب، ج، د
            optBtn.dataset.optIndex = idx;
            if (selectedAnswerIndex === idx) optBtn.classList.add('selected-option');
            optBtn.addEventListener('click', (e) => {
                if (waitingForNext) {
                    showToastMessage("يرجى الانتقال للسؤال التالي أولاً", "#aaa");
                    return;
                }
                // إزالة التحديد السابق
                document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected-option'));
                selectedAnswerIndex = idx;
                optBtn.classList.add('selected-option');
                // مسح رسالة الفيدباك القديمة عند اختيار جديد
                feedbackMsgDiv.innerHTML = '';
                feedbackMsgDiv.className = 'feedback';
            });
            optionsContainer.appendChild(optBtn);
        });
        // تحديث عداد الأسئلة
        questionCounterSpan.innerText = `السؤال ${currentQIndex+1} / ${shuffledQuestions.length}`;
        // تنظيف رسالة الفيدباك ان لم يكن هناك
        if (!feedbackMsgDiv.innerHTML.trim()) {
            feedbackMsgDiv.innerHTML = '✨ اختر الإجابة ثم اضغط "السؤال التالي" ✨';
            feedbackMsgDiv.className = 'feedback';
        }
    }

    // معالجة الإجابة والانتقال للسؤال التالي (زر "السؤال التالي")
    async function handleNextQuestion() {
        if (waitingForNext) return;
        // التأكد من اختيار إجابة
        if (selectedAnswerIndex === null) {
            showToastMessage("⚠️ الرجاء اختيار إجابة أولاً!", "#e67e22");
            return;
        }
        
        waitingForNext = true;
        // التحقق من صحة الإجابة
        const isCorrect = (selectedAnswerIndex === currentQuestionObj.correct);
        const correctAnswerText = currentQuestionObj.options[currentQuestionObj.correct];
        
        // عرض التغذية الراجعة
        if (isCorrect) {
            feedbackMsgDiv.innerHTML = `✅ إجابة صحيحة! أحسنت.`;
            feedbackMsgDiv.className = 'feedback correct-feedback';
        } else {
            feedbackMsgDiv.innerHTML = `❌ إجابة خاطئة! الإجابة الصحيحة هي: "${correctAnswerText}".`;
            feedbackMsgDiv.className = 'feedback wrong-feedback';
        }
        
        // تعطيل أزرار الخيارات أثناء التغذية الراجعة (لتجنب تغيير الاختيار)
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.style.pointerEvents = 'none';
        });
        nextQuestionBtn.disabled = true;
        
        // تأخير بسيط لقراءة النتيجة ثم الانتقال
        setTimeout(() => {
            // الانتقال للسؤال التالي
            currentQIndex++;
            if (currentQIndex < shuffledQuestions.length) {
                // إعادة ضبط الحالة للسؤال الجديد
                selectedAnswerIndex = null;
                waitingForNext = false;
                renderCurrentQuestion();
                // إعادة تفعيل الأزرار
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.style.pointerEvents = 'auto';
                });
                nextQuestionBtn.disabled = false;
            } else {
                // تم الانتهاء من جميع الأسئلة (10)
                finishLevel();
            }
        }, 1000);
    }
    
    // إنهاء المستوى: تحديث حالة الإكمال، شطب المستوى، العودة للقائمة
    function finishLevel() {
        // التأكد من عدم تكرار الإنهاء
        if (!activeLevel) return;
        if (!levelsCompletion[activeLevel]) {
            levelsCompletion[activeLevel] = true;
            // حفظ التقدم (اختياري) في localStorage يمكن إضافته لكن ليس إلزامياً
            saveCompletionState();
            showToastMessage(`🏅 تهانينا! أكملت المستوى ${activeLevel === 'easy' ? 'السهل' : (activeLevel === 'medium' ? 'المتوسط' : 'الصعب')} بالكامل! تم شطب المستوى ✅`, '#2ecc71');
        } else {
            showToastMessage("المستوى مكتمل سابقاً", "#aaa");
        }
        // العودة للقائمة الرئيسية
        returnToMenu();
    }
    
    // العودة للقائمة مع إعادة تعيين جلسة اللعب
    function returnToMenu() {
        // إعادة تعيين متغيرات اللعب
        activeLevel = null;
        shuffledQuestions = [];
        currentQIndex = 0;
        selectedAnswerIndex = null;
        waitingForNext = false;
        currentQuestionObj = null;
        // إعادة تفعيل واجهة القائمة
        renderMenu();    // تحديث حالة المستويات (الشطب يظهر)
        menuScreen.classList.remove('hidden');
        gameScreen.classList.add('hidden');
        // إعادة ضبط الفيدباك للاستخدام القادم
        feedbackMsgDiv.innerHTML = '';
        optionsContainer.innerHTML = '';
    }
    
    // حفظ حالة الإكمال في localStorage (حتى لا تفقد بعد تحديث الصفحة)
    function saveCompletionState() {
        localStorage.setItem('quizLevelsCompletion', JSON.stringify(levelsCompletion));
    }
    
    function loadCompletionState() {
        const saved = localStorage.getItem('quizLevelsCompletion');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed && typeof parsed === 'object') {
                    levelsCompletion = { ...levelsCompletion, ...parsed };
                }
            } catch(e) {}
        }
        renderMenu();
    }
    
    // إعادة تعيين كل التقدم (شطب جميع المستويات وإلغاء الإكمال)
    function resetAllProgress() {
        levelsCompletion = { easy: false, medium: false, hard: false };
        saveCompletionState();
        renderMenu();
        showToastMessage("🔄 تم إعادة تعيين جميع المستويات! يمكنك لعب أي مستوى من جديد.", "#f39c12");
        // إذا كان في شاشة اللعب، نرجع للقائمة
        if (!menuScreen.classList.contains('hidden') === false) {
            returnToMenu();
        }
    }
    
    // أحداث الأزرار
    backToMenuBtn.addEventListener('click', () => {
        if (activeLevel && !levelsCompletion[activeLevel] && currentQIndex < shuffledQuestions.length && currentQIndex > 0) {
            if (confirm("⚠️ العودة الآن ستؤدي إلى فقدان تقدمك في هذا المستوى. هل تريد المتابعة؟")) {
                returnToMenu();
            }
        } else {
            returnToMenu();
        }
    });
    
    nextQuestionBtn.addEventListener('click', handleNextQuestion);
    resetAllBtn.addEventListener('click', resetAllProgress);
    
    // تهيئة أولية
    loadCompletionState();
    
    // إضافة رسالة ترحيبية
    setTimeout(() => {
        showToastMessage("🎮 اختر مستوى وتحدَّ! كل مستوى 10 أسئلة فريدة.", "#FFD966");
    }, 200);
</script>
</body>
</html>
