<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Hero | المحرر الشامل</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --primary: #007bff; --border: #ddd;
        }
        [data-theme="dark"] {
            --bg: #18191a; --card: #242526; --text: #e4e6eb; --primary: #4599ff; --border: #3e4042;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: var(--card); width: 100%; max-width: 700px; padding: 30px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .theme-btn { cursor: pointer; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.8rem; }

        .tab-system { display: flex; gap: 10px; margin-bottom: 20px; background: var(--bg); padding: 5px; border-radius: 12px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; text-align: center; border-radius: 8px; transition: 0.2s; font-weight: bold; }
        .tab.active { background: var(--primary); color: white; }

        .upload-section { border: 2px dashed var(--primary); padding: 30px; border-radius: 15px; cursor: pointer; margin-bottom: 20px; transition: 0.2s; position: relative; }
        .upload-section:hover { background: rgba(0, 123, 255, 0.05); }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .input-box { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; }
        
        .action-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .action-btn:active { transform: scale(0.98); }

        #fileList { text-align: right; margin-bottom: 15px; font-size: 0.9rem; list-style: none; padding: 0; }
        #fileList li { background: var(--bg); padding: 8px 12px; border-radius: 6px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        
        .preview-frame { width: 100%; height: 250px; border-radius: 10px; margin-top: 20px; display: none; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">PDF Hero ⚡</h2>
        <button class="theme-btn" onclick="toggleTheme()">تبديل الوضع 🌓</button>
    </div>

    <div class="tab-system">
        <div class="tab active" onclick="switchTab('cut')">قص صفحات</div>
        <div class="tab" onclick="switchTab('merge')">دمج ملفات</div>
    </div>

    <div class="upload-section">
        <span id="uploadText">اسحب الملفات هنا أو اضغط للاختيار</span>
        <input type="file" id="pdfFiles" accept="application/pdf" multiple>
    </div>

    <ul id="fileList"></ul>

    <div id="cutSection">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>من صفحة:</label>
                <input type="number" id="startP" class="input-box" placeholder="1">
            </div>
            <div>
                <label>إلى صفحة:</label>
                <input type="number" id="endP" class="input-box" placeholder="الأخيرة">
            </div>
        </div>
        <div style="margin-top: 15px;">
            <label>أو اختر صفحات محددة (مثلاً: 1,3,5):</label>
            <input type="text" id="customPages" class="input-box" placeholder="اتركها فارغة إذا استخدمت النطاق أعلاه">
        </div>
    </div>

    <div id="mergeSection" style="display:none;">
        <p style="font-size: 0.9rem; color: #888;">سيتم دمج الملفات المرفوعة بالترتيب الموضح أعلاه.</p>
    </div>

    <button class="action-btn" onclick="executeAction()">تنفيذ العملية الآن</button>
    
    <iframe id="preview" class="preview-frame"></iframe>
</div>

<script>
    let currentMode = 'cut';
    const pdfFilesInput = document.getElementById('pdfFiles');
    const fileListDisplay = document.getElementById('fileList');

    function toggleTheme() {
        const body = document.documentElement;
        body.getAttribute('data-theme') === 'dark' ? body.removeAttribute('data-theme') : body.setAttribute('data-theme', 'dark');
    }

    function switchTab(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('cutSection').style.display = mode === 'cut' ? 'block' : 'none';
        document.getElementById('mergeSection').style.display = mode === 'merge' ? 'block' : 'none';
        pdfFilesInput.multiple = (mode === 'merge');
    }

    pdfFilesInput.onchange = function() {
        fileListDisplay.innerHTML = "";
        Array.from(this.files).forEach(file => {
            const li = document.createElement('li');
            li.innerHTML = `<span>📄 ${file.name}</span> <span>${(file.size/1024/1024).toFixed(2)} MB</span>`;
            fileListDisplay.appendChild(li);
        });
        
        if(this.files.length === 1 && currentMode === 'cut') {
            const url = URL.createObjectURL(this.files[0]);
            document.getElementById('preview').src = url;
            document.getElementById('preview').style.display = 'block';
        }
    };

    async function executeAction() {
        const files = pdfFilesInput.files;
        if (files.length === 0) return alert("الرجاء اختيار ملفات أولاً!");

        const newPdf = await PDFLib.PDFDocument.create();

        if (currentMode === 'cut') {
            const file = files[0];
            const existingPdf = await PDFLib.PDFDocument.load(await file.arrayBuffer());
            const total = existingPdf.getPageCount();
            let pagesToCopy = [];

            const custom = document.getElementById('customPages').value;
            if (custom) {
                pagesToCopy = custom.split(',').map(p => parseInt(p.trim()) - 1).filter(p => p >= 0 && p < total);
            } else {
                const start = parseInt(document.getElementById('startP').value) || 1;
                const end = parseInt(document.getElementById('endP').value) || total;
                for (let i = start - 1; i < end; i++) pagesToCopy.push(i);
            }

            const copiedPages = await newPdf.copyPages(existingPdf, pagesToCopy);
            copiedPages.forEach(p => newPdf.addPage(p));

        } else {
            for (const file of files) {
                const pdf = await PDFLib.PDFDocument.load(await file.arrayBuffer());
                const copiedPages = await newPdf.copyPages(pdf, pdf.getPageIndices());
                copiedPages.forEach(p => newPdf.addPage(p));
            }
        }

        const pdfBytes = await newPdf.save();
        download(pdfBytes, currentMode === 'cut' ? "trimmed.pdf" : "merged.pdf");
    }

    function download(bytes, name) {
        const blob = new Blob([bytes], { type: "application/pdf" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
    }
</script>

</body>
</html>
