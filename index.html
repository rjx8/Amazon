<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تحويل الأكواد</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3350;
            --border-light: #3a4060;
            --primary: #5b7cfa;
            --primary-hover: #4a6cf7;
            --primary-glow: rgba(91,124,250,0.18);
            --orange: #f97316;
            --orange-hover: #ea580c;
            --orange-glow: rgba(249,115,22,0.18);
            --green: #22c55e;
            --green-glow: rgba(34,197,94,0.15);
            --red: #ef4444;
            --text: #e8eaf0;
            --text-muted: #8892b0;
            --text-dim: #4a5580;
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .header-badge {
            background: var(--primary-glow);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        /* ===== LAYOUT ===== */
        .app-body {
            display: flex;
            flex: 1;
            height: calc(100vh - 65px);
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 400px;
            min-width: 360px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        /* ===== SECTION TITLES ===== */
        .section-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-top: 18px;
            padding-right: 2px;
        }
        .section-label:first-child { margin-top: 0; }

        /* ===== PROMPTS ===== */
        .prompts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            margin-bottom: 4px;
        }
        .prompt-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 8px;
            border-radius: var(--radius-sm);
            font-size: 11.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Cairo', sans-serif;
            text-align: right;
        }
        .prompt-btn:hover {
            background: var(--primary-glow);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
        }
        .prompt-btn .icon { font-size: 14px; flex-shrink: 0; }
        .prompt-btn.success {
            background: var(--green-glow);
            border-color: var(--green);
            color: var(--green);
        }

        /* ===== FORM ELEMENTS ===== */
        .form-row { display: flex; gap: 8px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; flex: 1; }
        label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, select {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.2s;
            width: 100%;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        select option { background: var(--surface2); }

        /* ===== TEXTAREA ===== */
        .textarea-wrap {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }
        .textarea-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        textarea {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-family: 'Courier New', monospace;
            direction: ltr;
            text-align: left;
            resize: vertical;
            min-height: 200px;
            line-height: 1.6;
            transition: border-color 0.2s;
            width: 100%;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .char-count {
            font-size: 10px;
            color: var(--text-dim);
            text-align: left;
        }
        .clear-btn {
            background: transparent;
            border: 1px solid #3f2020;
            color: var(--red);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Cairo', sans-serif;
        }
        .clear-btn:hover { background: rgba(239,68,68,0.15); border-color: var(--red); }

        /* ===== EXPORT BUTTONS ===== */
        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .export-row { display: flex; gap: 8px; }
        .export-btn {
            flex: 1;
            padding: 13px 12px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-pdf {
            background: var(--primary);
            color: white;
        }
        .btn-pdf:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 20px var(--primary-glow); }
        .btn-video {
            background: var(--orange);
            color: white;
        }
        .btn-video:hover { background: var(--orange-hover); transform: translateY(-1px); box-shadow: 0 4px 20px var(--orange-glow); }
        .export-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ===== PREVIEW ===== */
        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #080a0f;
        }
        .preview-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .preview-bar-left { display: flex; align-items: center; gap: 10px; }
        .preview-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
        .preview-title { font-size: 13px; font-weight: 700; color: var(--text-muted); }
        .size-badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .preview-frame-wrap {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 24px;
            background: #080a0f;
        }
        .iframe-shadow {
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
        }
        #preview-frame {
            border: none;
            display: block;
            background: white;
        }
        .preview-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--text-dim);
        }
        .preview-empty-icon { font-size: 48px; opacity: 0.4; }
        .preview-empty-text { font-size: 14px; font-weight: 600; opacity: 0.5; }

        /* ===== PROGRESS ===== */
        .progress-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .progress-box {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 32px 36px;
            border-radius: 16px;
            text-align: center;
            min-width: 320px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .progress-icon { font-size: 32px; margin-bottom: 12px; }
        .progress-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
        .progress-bar-track {
            width: 100%;
            height: 6px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--orange));
            width: 0%;
            transition: width 0.3s;
            border-radius: 3px;
        }
        .progress-pct { font-size: 12px; color: var(--text-muted); }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            z-index: 20000;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error { border-color: var(--red); color: var(--red); }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .app-body { flex-direction: column; height: auto; overflow: auto; }
            .sidebar { width: 100%; min-width: auto; border-left: none; border-top: 1px solid var(--border); height: auto; }
            .preview-area { height: 50vh; min-height: 300px; }
        }

        /* ===== DIVIDER ===== */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 14px 0;
        }

        /* info tip */
        .tip {
            background: rgba(91,124,250,0.08);
            border: 1px solid rgba(91,124,250,0.2);
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-logo">
        <div class="logo-icon">🛠️</div>
        منصة تحويل الأكواد
    </div>
    <div class="header-badge">PDF & VIDEO</div>
</div>

<div class="app-body">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-scroll">

            <!-- PROMPTS -->
            <div class="section-label">📋 نسخ برومبت جاهز للذكاء الاصطناعي</div>
            <div class="prompts-grid">
                <button class="prompt-btn" onclick="copyPrompt('a4_portrait', this)">
                    <span class="icon">📄</span> بحث طولي (A4)
                </button>
                <button class="prompt-btn" onclick="copyPrompt('a4_landscape', this)">
                    <span class="icon">📋</span> بحث عرضي (A4)
                </button>
                <button class="prompt-btn" onclick="copyPrompt('video_portrait', this)">
                    <span class="icon">📱</span> مقطع طولي (9:16)
                </button>
                <button class="prompt-btn" onclick="copyPrompt('video_landscape', this)">
                    <span class="icon">🖥️</span> مقطع عرضي (16:9)
                </button>
            </div>

            <div class="divider"></div>

            <!-- FILE SETTINGS -->
            <div class="section-label">⚙️ إعدادات الملف</div>

            <div class="form-group">
                <label>اسم الملف</label>
                <input type="text" id="file-name" value="مستند_جديد" placeholder="اكتب اسم الملف...">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>نوع التصدير</label>
                    <select id="format-select" onchange="updatePreviewSize()">
                        <option value="a4_portrait">بحث طولي (A4)</option>
                        <option value="a4_landscape">بحث عرضي (A4)</option>
                        <option value="video_portrait">مقطع طولي (9:16)</option>
                        <option value="video_landscape" selected>مقطع عرضي (16:9)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>جودة PDF</label>
                    <select id="quality-select">
                        <option value="1">عادية</option>
                        <option value="2" selected>عالية</option>
                        <option value="3">ممتازة</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>مدة كل شريحة بالثانية (للفيديو)</label>
                <input type="number" id="page-duration" value="3" min="1" max="15" step="0.5">
            </div>

            <div class="divider"></div>

            <!-- CODE INPUT -->
            <div class="section-label">💻 كود HTML</div>
            <div class="textarea-wrap">
                <div class="textarea-toolbar">
                    <span id="char-count" class="char-count">0 حرف</span>
                    <button class="clear-btn" onclick="clearCode()">🗑️ مسح</button>
                </div>
                <textarea id="html-input" oninput="onCodeInput()" placeholder="الصق كود HTML هنا..."></textarea>
                <div class="tip">💡 تأكد أن الصفحات تستخدم class="page" أو class="slide"</div>
            </div>

        </div>

        <!-- FOOTER BUTTONS -->
        <div class="sidebar-footer">
            <div class="export-row">
                <button id="capture-btn" class="export-btn btn-pdf" onclick="exportToPDF()">
                    📥 PDF
                </button>
                <button id="video-btn" class="export-btn btn-video" onclick="exportToVideo()">
                    🎬 فيديو
                </button>
            </div>
        </div>
    </div>

    <!-- PREVIEW -->
    <div class="preview-area">
        <div class="preview-bar">
            <div class="preview-bar-left">
                <div class="preview-dot"></div>
                <span class="preview-title">المعاينة المباشرة</span>
            </div>
            <span class="size-badge" id="size-tag">16:9 — 1280 × 720</span>
        </div>
        <div class="preview-frame-wrap" id="preview-wrap">
            <div class="preview-empty" id="preview-empty">
                <div class="preview-empty-icon">📋</div>
                <div class="preview-empty-text">الصق الكود لتظهر المعاينة هنا</div>
            </div>
            <div class="iframe-shadow" id="iframe-shadow" style="display:none;">
                <iframe id="preview-frame"></iframe>
            </div>
        </div>
    </div>
</div>

<!-- PROGRESS -->
<div id="progress-overlay" class="progress-overlay">
    <div class="progress-box">
        <div class="progress-icon" id="progress-icon">🎬</div>
        <div class="progress-title" id="progress-text">جاري التجهيز...</div>
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="progress-pct" id="progress-detail">0%</div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== DIMENSIONS CONFIG =====
const FORMATS = {
    a4_portrait:   { w: 794,  h: 1123, label: 'A4 طولي — 794 × 1123',  pdfOrient: 'portrait'  },
    a4_landscape:  { w: 1123, h: 794,  label: 'A4 عرضي — 1123 × 794',  pdfOrient: 'landscape' },
    video_portrait:  { w: 1080, h: 1920, label: '9:16 — 1080 × 1920', pdfOrient: 'portrait'  },
    video_landscape: { w: 1280, h: 720,  label: '16:9 — 1280 × 720',  pdfOrient: 'landscape' },
};

    a4_portrait: `أنت مصمم وثائق HTML محترف. قم بإنشاء كود HTML كامل لبحث أكاديمي بالعربية وفق المواصفات التالية:

3. الـ body يحتوي على: display: block; direction: rtl; text-align: right; margin: 0; padding: 0; box-sizing: border-box;

    video_portrait: `أنت مصمم مقاطع فيديو قصيرة للجوال (TikTok/Reels). قم بإنشاء كود HTML كامل بمقاس (9:16) مع أنيميشن CSS جذاب.

// ===== TOAST =====
function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== COPY PROMPT =====
function copyPrompt(type, btn) {
    navigator.clipboard.writeText(PROMPTS[type]).then(() => {
        const orig = btn.innerHTML;
        btn.innerHTML = '<span class="icon">✅</span> تم النسخ!';
        btn.classList.add('success');
        setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('success'); }, 2000);
        showToast('✅ تم نسخ البرومبت بنجاح!', 'success');
    }).catch(() => showToast('❌ فشل النسخ', 'error'));
}

// ===== CODE INPUT =====
function onCodeInput() {
    const code = document.getElementById('html-input').value;
    document.getElementById('char-count').textContent = code.length.toLocaleString('ar') + ' حرف';
    updatePreview(code);
}

function clearCode() {
    if (!confirm('هل أنت متأكد من مسح الكود؟')) return;
    document.getElementById('html-input').value = '';
    document.getElementById('char-count').textContent = '0 حرف';
    document.getElementById('preview-empty').style.display = 'flex';
    document.getElementById('iframe-shadow').style.display = 'none';
}

// ===== PREVIEW =====
function updatePreview(code) {
    if (!code) code = document.getElementById('html-input').value;
    const empty = document.getElementById('preview-empty');
    const shadow = document.getElementById('iframe-shadow');
    const iframe = document.getElementById('preview-frame');
    const fmt = FORMATS[document.getElementById('format-select').value];

    if (!code.trim()) {
        empty.style.display = 'flex';
        shadow.style.display = 'none';
        return;
    }

    empty.style.display = 'none';
    shadow.style.display = 'block';

    // Scale iframe to fit nicely
    const wrap = document.getElementById('preview-wrap');
    const wrapW = wrap.clientWidth - 48;
    const wrapH = wrap.clientHeight - 48;
    const scaleX = wrapW / fmt.w;
    const scaleY = wrapH / fmt.h;
    const scale = Math.min(scaleX, scaleY, 1);

    iframe.style.width = fmt.w + 'px';
    iframe.style.height = fmt.h + 'px';
    iframe.style.transform = `scale(${scale})`;
    iframe.style.transformOrigin = 'top center';
    shadow.style.width = (fmt.w * scale) + 'px';
    shadow.style.height = (fmt.h * scale) + 'px';

    iframe.srcdoc = code;
}

function updatePreviewSize() {
    const fmt = FORMATS[document.getElementById('format-select').value];
    document.getElementById('size-tag').textContent = fmt.label;
    updatePreview();
}

// ===== IMAGE UTILS =====
async function urlToDataURL(url) {
    if (!url || url.startsWith('data:') || url.startsWith('blob:')) return url;
    let absUrl = url;
    try {
        if (!url.startsWith('http') && !url.startsWith('//')) absUrl = new URL(url, location.href).href;
        else if (url.startsWith('//')) absUrl = 'https:' + url;
    } catch(e) {}

    const proxies = [null, 'https://corsproxy.io/?', 'https://api.allorigins.win/raw?url='];
    for (const proxy of proxies) {
        try {
            const fetchUrl = proxy ? proxy + encodeURIComponent(absUrl) : absUrl;
            const res = await fetch(fetchUrl, { mode: 'cors', credentials: 'omit' });
            if (!res.ok) continue;
            const blob = await res.blob();
            return await new Promise(r => { const fr = new FileReader(); fr.onloadend = () => r(fr.result); fr.onerror = () => r(null); fr.readAsDataURL(blob); });
        } catch(e) {}
    }
    return new Promise(r => {
        const img = new Image(); img.crossOrigin = 'Anonymous';
        img.onload = () => { try { const c = document.createElement('canvas'); c.width = img.width; c.height = img.height; c.getContext('2d').drawImage(img,0,0); r(c.toDataURL('image/jpeg',0.9)); } catch(e){ r(null); } };
        img.onerror = () => r(null);
        img.src = absUrl;
        setTimeout(() => r(null), 5000);
    });
}

async function convertImages(container) {
    const imgs = Array.from(container.querySelectorAll('img'));
    await Promise.all(imgs.map(async img => {
        const src = img.getAttribute('src');
        if (!src || src.startsWith('data:')) return;
        const d = await urlToDataURL(src);
        if (d) img.setAttribute('src', d);
    }));
}

// ===== HIDDEN CONTAINER =====
function buildHiddenContainer(code, fmt) {
    const el = document.createElement('div');
    el.dir = 'rtl';
    Object.assign(el.style, {
        position: 'absolute', top: '0', left: '0',
        zIndex: '-9999', opacity: '0.01',
        pointerEvents: 'none', width: fmt.w + 'px'
    });
    el.innerHTML = code;

    // Fix common rendering issues
    const fix = document.createElement('style');
    fix.innerHTML = `
        * { box-sizing: border-box !important; letter-spacing: normal !important; }
        ul { list-style: none !important; padding-right: 0 !important; }
        body { margin: 0 !important; padding: 0 !important; display: block !important; }
        .page, .slide {
            width: ${fmt.w}px !important;
            height: ${fmt.h}px !important;
            overflow: hidden !important;
            position: relative !important;
            flex-shrink: 0 !important;
        }
    `;
    el.appendChild(fix);
    document.body.appendChild(el);
    return el;
}

// ===== PROGRESS =====
function setProgress(pct, text, icon = '🎬') {
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-detail').textContent = Math.floor(pct) + '%';
    if (text) document.getElementById('progress-text').textContent = text;
    if (icon) document.getElementById('progress-icon').textContent = icon;
}

// ===== PDF EXPORT =====
async function exportToPDF() {
    const btn = document.getElementById('capture-btn');
    const code = document.getElementById('html-input').value;
    if (!code.trim()) { showToast('⚠️ الرجاء لصق الكود أولاً', 'error'); return; }

    const fmtKey = document.getElementById('format-select').value;
    const fmt = FORMATS[fmtKey];
    const fileName = document.getElementById('file-name').value || 'document';
    const quality = parseInt(document.getElementById('quality-select').value);

    btn.disabled = true;
    btn.textContent = '⏳ جاري...';
    document.getElementById('progress-overlay').style.display = 'flex';
    setProgress(0, 'جاري تجهيز الكود...', '📄');

    const container = buildHiddenContainer(code, fmt);

    try {
        setProgress(5, 'تحويل الصور...', '🖼️');
        await convertImages(container);
        await document.fonts.ready;

        // Small delay for fonts/animations to settle
        await new Promise(r => setTimeout(r, 500));

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: fmt.pdfOrient, unit: 'px', format: [fmt.w, fmt.h] });

        let pages = Array.from(container.querySelectorAll('.page'));
        if (pages.length === 0) pages = [container];

        for (let i = 0; i < pages.length; i++) {
            const pct = 10 + ((i / pages.length) * 85);
            setProgress(pct, `تصوير الصفحة ${i+1} من ${pages.length}`, '📸');

            const canvas = await html2canvas(pages[i], {
                scale: quality,
                useCORS: true,
                allowTaint: true,
                width: fmt.w,
                height: fmt.h,
                windowWidth: fmt.w,
                windowHeight: fmt.h,
                backgroundColor: '#ffffff',
                logging: false,
                imageTimeout: 8000,
            });

            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            if (i > 0) pdf.addPage([fmt.w, fmt.h], fmt.pdfOrient);
            pdf.addImage(imgData, 'JPEG', 0, 0, fmt.w, fmt.h);
        }

        setProgress(100, 'جاري الحفظ...', '✅');
        await new Promise(r => setTimeout(r, 300));
        pdf.save(`${fileName}.pdf`);
        showToast(`✅ تم حفظ ${pages.length} صفحة بنجاح!`, 'success');

    } catch(err) {
        console.error(err);
        showToast('❌ حدث خطأ: ' + err.message, 'error');
    } finally {
        document.body.removeChild(container);
        document.getElementById('progress-overlay').style.display = 'none';
        btn.disabled = false;
        btn.textContent = '📥 PDF';
    }
}

// ===== VIDEO EXPORT =====
async function exportToVideo() {
    const btn = document.getElementById('video-btn');
    const code = document.getElementById('html-input').value;
    if (!code.trim()) { showToast('⚠️ الرجاء لصق الكود أولاً', 'error'); return; }

    const fmtKey = document.getElementById('format-select').value;
    const fmt = FORMATS[fmtKey];
    const fileName = document.getElementById('file-name').value || 'video';
    const durationPerPage = parseFloat(document.getElementById('page-duration').value) || 3;
    const FPS = 30;
    const framesPerPage = Math.ceil(FPS * durationPerPage);

    btn.disabled = true;
    btn.textContent = '⏳ جاري...';
    document.getElementById('progress-overlay').style.display = 'flex';
    setProgress(0, 'تجهيز الكود...', '🎬');

    const container = buildHiddenContainer(code, fmt);

    // Canvas for video frames
    const canvas = document.createElement('canvas');
    canvas.width = fmt.w;
    canvas.height = fmt.h;
    const ctx = canvas.getContext('2d');

    try {
        setProgress(3, 'تحويل الصور...', '🖼️');
        await convertImages(container);
        await document.fonts.ready;
        await new Promise(r => setTimeout(r, 600));

        let pages = Array.from(container.querySelectorAll('.page, .slide'));
        if (pages.length === 0) pages = [container];

        setProgress(5, `تصوير ${pages.length} شريحة...`, '📸');

        // ---- PRE-RENDER all pages to canvases ----
        const renderedCanvases = [];
        for (let i = 0; i < pages.length; i++) {
            const pct = 5 + ((i / pages.length) * 55);
            setProgress(pct, `تصوير الشريحة ${i+1} من ${pages.length}`, '📸');

            // Ensure page has correct size before capture
            const pg = pages[i];
            pg.style.width = fmt.w + 'px';
            pg.style.height = fmt.h + 'px';
            pg.style.overflow = 'hidden';
            pg.style.position = 'relative';

            const imgCanvas = await html2canvas(pg, {
                scale: 1,           // scale=1 for video (faster, less memory)
                useCORS: true,
                allowTaint: true,
                width: fmt.w,
                height: fmt.h,
                windowWidth: fmt.w,
                windowHeight: fmt.h,
                backgroundColor: '#ffffff',
                logging: false,
                imageTimeout: 8000,
            });
            renderedCanvases.push(imgCanvas);
        }

        setProgress(60, 'تجهيز التسجيل...', '🎬');

        // ---- Setup MediaRecorder ----
        const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
            ? 'video/webm;codecs=vp9'
            : MediaRecorder.isTypeSupported('video/webm')
            ? 'video/webm'
            : 'video/webm';

        const stream = canvas.captureStream(FPS);
        const recorder = new MediaRecorder(stream, {
            mimeType,
            videoBitsPerSecond: 8_000_000
        });
        const chunks = [];
        recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

        const done = new Promise(res => { recorder.onstop = res; });
        recorder.start();

        const totalFrames = pages.length * framesPerPage;
        let rendered = 0;

        // ---- Draw frames ----
        for (let p = 0; p < renderedCanvases.length; p++) {
            const src = renderedCanvases[p];
            for (let f = 0; f < framesPerPage; f++) {
                ctx.clearRect(0, 0, fmt.w, fmt.h);
                ctx.drawImage(src, 0, 0, fmt.w, fmt.h);
                rendered++;
                const pct = 60 + ((rendered / totalFrames) * 35);
                setProgress(pct, `تجميع الإطارات: شريحة ${p+1}/${renderedCanvases.length}`, '🎞️');
                // Yield to browser to actually capture the frame
                await new Promise(r => setTimeout(r, Math.ceil(1000 / FPS)));
            }
        }

        recorder.stop();
        await done;

        setProgress(98, 'حفظ الملف...', '💾');
        const blob = new Blob(chunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${fileName}.webm`; a.click();
        URL.revokeObjectURL(url);

        setProgress(100, 'تم!', '✅');
        await new Promise(r => setTimeout(r, 400));
        showToast(`✅ تم حفظ الفيديو (${pages.length} شريحة)!`, 'success');

    } catch(err) {
        console.error(err);
        showToast('❌ خطأ في التصدير: ' + err.message, 'error');
    } finally {
        if (container.parentNode) document.body.removeChild(container);
        document.getElementById('progress-overlay').style.display = 'none';
        btn.disabled = false;
        btn.textContent = '🎬 فيديو';
    }
}
