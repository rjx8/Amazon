<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Surprise - Fixed Click</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #87CEEB;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            font-family: 'Quicksand', sans-serif;
        }

        .game-area { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 5; /* طبقة تحت الإطار لكن تسمح باللمس */
        }

        /* --- الكيكة --- */
        .cake-wrapper { position: relative; z-index: 20; text-align: center; }
        .cake { position: relative; width: 160px; height: 120px; margin: 0 auto; border-bottom: 4px solid #fff; cursor: pointer; pointer-events: auto; }
        .layer, .frosting { position: absolute; width: 140px; left: 10px; opacity: 0; transform: translateY(-50px); animation: dropIn 0.6s ease-out forwards; transition: 0.4s; }
        .layer-1 { bottom: 5px; height: 25px; background-color: #8d6e63; border-radius: 8px; animation-delay: 0.2s; }
        .layer-2 { bottom: 30px; height: 25px; background-color: #795548; border-radius: 8px; animation-delay: 0.5s; }
        .layer-3 { bottom: 55px; height: 25px; background-color: #8d6e63; border-radius: 8px; animation-delay: 0.8s; }
        .frosting { bottom: 80px; background-color: #fff; height: 30px; animation-delay: 1.1s; z-index: 2; border-radius: 12px 12px 4px 4px; }
        .frosting::after { content: ''; position: absolute; bottom: -12px; left: 8px; width: 22px; height: 22px; background-color: #fff; border-radius: 50%; box-shadow: 35px 6px 0 0 #fff, 75px -2px 0 0 #fff, 105px 8px 0 0 #fff; }
        .candle { position: absolute; bottom: 110px; left: 75px; width: 6px; height: 30px; background-color: #fff; opacity: 0; animation: fadeIn 0.5s ease forwards 1.6s; z-index: 3; }
        .candle::before { content: ''; position: absolute; top: -12px; left: -3px; width: 12px; height: 15px; background-color: #ffeb3b; border-radius: 50%; box-shadow: 0 0 10px #ffeb3b; animation: flicker 0.3s infinite alternate; }

        /* --- الهدايا --- */
        .gift { position: absolute; width: 50px; height: 50px; cursor: pointer; z-index: 10; opacity: 0; transform: scale(0.5); animation: giftIn 0.5s ease forwards; pointer-events: auto; }
        .gift-box { position: absolute; width: 100%; height: 100%; background-color: #FF7043; border-radius: 4px; }
        .gift-box::before { content: ''; position: absolute; left: 50%; top: 0; transform: translateX(-50%); width: 8px; height: 100%; background-color: #fff; }
        .gift-box::after { content: ''; position: absolute; left: 0; top: 0; width: 100%; height: 8px; background-color: #FFAB91; border-radius: 4px 4px 0 0; }
        .gift-bow { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 18px; height: 10px; background-color: #fff; border-radius: 5px 5px 0 0; }
        .gift-1 { top: 15%; left: 15%; animation-delay: 1.8s; }
        .gift-2 { top: 15%; right: 15%; animation-delay: 2s; }
        .gift-3 { bottom: 15%; left: 15%; animation-delay: 2.2s; }
        .gift-4 { bottom: 15%; right: 15%; animation-delay: 2.4s; }

        /* --- البطاقة النهائية مع الإطار --- */
        .final-container { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); 
            text-align: center; width: 85%; max-width: 420px; padding: 45px 25px;
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        border-radius: 20px; opacity: 0; pointer-events: none; transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; 
        }

        .final-frame { position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; pointer-events: none; }
        .final-frame svg { width: 100%; height: 100%; }
        .frame-path { stroke: #6c99af; stroke-width: 3; fill: none; }
        .frame-heart { fill: #6c99af; }

        .main-title { font-size: clamp(24px, 7vw, 38px); color: #fff; margin: 0 0 10px 0; font-weight: 700; letter-spacing: 2px; }
        .sub-title { font-size: clamp(14px, 3.5vw, 16.5px); color: #fff; margin: 0; font-weight: 500; line-height: 1.6; }

        /* التحكم بالحالات */
        .show-message { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .eaten { opacity: 0 !important; transform: scale(0.5) translateY(20px) !important; pointer-events: none; }
        .gift-hidden { opacity: 0 !important; transform: scale(0.2) !important; pointer-events: none; }
        .press-hint { color: white; font-weight: bold; margin-top: 25px; animation: blink 1s infinite; pointer-events: none; }

        @keyframes dropIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes giftIn { to { opacity: 1; transform: scale(1); } }
        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes flicker { from { transform: scale(1); } to { transform: scale(1.1); } }
        .confetti { position: absolute; width: 8px; height: 8px; border-radius: 2px; pointer-events: none; z-index: 150; }
    </style>
</head>
<body>

    <div class="game-area">
        <div class="cake-wrapper" id="cakeWrapper">
            <div class="cake" onclick="eatLayer()">
                <div class="layer layer-1"></div>
                <div class="layer layer-2"></div>
                <div class="layer layer-3"></div>
                <div class="frosting" id="fLayer"></div>
                <div class="candle" id="cndl"></div>
            </div>
            <div class="press-hint" id="hint">Press Cake to Eat!</div>
        </div>

        <div class="gift gift-1" onclick="popGift(this)"><div class="gift-box"></div><div class="gift-bow"></div></div>
        <div class="gift gift-2" onclick="popGift(this)"><div class="gift-box"></div><div class="gift-bow"></div></div>
        <div class="gift gift-3" onclick="popGift(this)"><div class="gift-box"></div><div class="gift-bow"></div></div>
        <div class="gift gift-4" onclick="popGift(this)"><div class="gift-box"></div><div class="gift-bow"></div></div>
    </div>

    <div class="final-container" id="finalContainer">
        <div class="final-frame">
            <svg viewBox="0 0 100 100" preserveAspectRatio="none">
                <path class="frame-path" d="M10,5 L90,5 A5,5 0 0,1 95,10 L95,90 A5,5 0 0,1 90,95 L10,95 A5,5 0 0,1 5,90 L5,10 A5,5 0 0,1 10,5 Z"/>
                <circle class="frame-heart" cx="10" cy="10" r="3"/>
                <circle class="frame-heart" cx="90" cy="10" r="3"/>
                <circle class="frame-heart" cx="10" cy="90" r="3"/>
                <circle class="frame-heart" cx="90" cy="90" r="3"/>
            </svg>
        </div>
        <h1 class="main-title">HAPPY BIRTHDAY</h1>
        <p class="sub-title">
            Happy first year as an adult, happy last year in high school, I wish you to achieve everything you wish for this year and get the best, 
………happy 18 !
        </p>
    </div>

    <script>
        const layers = [document.getElementById('cndl'), document.getElementById('fLayer'), document.querySelector('.layer-3'), document.querySelector('.layer-2'), document.querySelector('.layer-1')];
        let layerIdx = 0;

        function eatLayer() {
            if (layerIdx === 0) document.getElementById('hint').style.display = 'none';
            if (layerIdx < layers.length) {
                layers[layerIdx].classList.add('eaten');
                layerIdx++;
                if (layerIdx === layers.length) {
                    setTimeout(() => {
                
        document.getElementById('cakeWrapper').style.display = 'none';
                        document.getElementById('finalContainer').classList.add('show-message');
                        for(let i=0; i<80; i++) createConfetti(window.innerWidth/2, window.innerHeight/2, true);
                    }, 500);
                }
            }
        }

        function popGift(gift) {
            const rect = gift.getBoundingClientRect();
            for (let i = 0; i < 20; i++) createConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2, false);
            gift.classList.add('gift-hidden');
        }

        function createConfetti(x, y, isFinal) {
            const colors = isFinal ? ['#fff', '#FFD700', '#FF69B4', '#00FF7F', '#1E90FF'] : ['#FF7043', '#fff', '#FFAB91'];
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = x + 'px'; confetti.style.top = y + 'px';
            document.body.appendChild(confetti);
            const angle = Math.random() * Math.PI * 2;
            const velocity = (isFinal ? 7 : 4) + Math.random() * 10;
            let vx = Math.cos(angle) * velocity; let vy = Math.sin(angle) * velocity;
            let posX = x; let posY = y;
            const animation = setInterval(() => {
                posX += vx; posY += vy; vy += 0.45;
                confetti.style.left = posX + 'px'; confetti.style.top = posY + 'px';
                confetti.style.opacity = parseFloat(confetti.style.opacity || 1) - 0.015;
                if (posY > window.innerHeight || confetti.style.opacity <= 0) { clearInterval(animation); confetti.remove(); }
            }, 20);
        }
    </script>
</body>
</html>
