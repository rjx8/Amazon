<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تحويل الأكواد إلى PDF وفيديو</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, sans-serif; background: #f4f6f8; color: #333; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 15px; }
        .header h2 { margin: 0; color: #1e293b; font-size: 22px;}
        .main-container { display: flex; gap: 15px; flex: 1; overflow: hidden; }
        @media (max-width: 768px) { .main-container { flex-direction: column; height: auto; overflow: visible; } body {height: auto; padding: 10px;} }
        
        .sidebar { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; display: flex; flex-direction: column; flex: 1; max-width: 380px; overflow-y: auto;}
        .preview-section { background: #fff; border-radius: 10px; padding: 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; display: flex; flex-direction: column; flex: 2; overflow: hidden; position: relative; }
        
        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; }
        label { margin-bottom: 6px; font-weight: bold; font-size: 13px; color: #475569; }
        input, select, textarea { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; font-family: inherit; transition: 0.2s;}
        input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        .textarea-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .clear-btn { background: #fee2e2; color: #ef4444; border: none; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .clear-btn:hover { background: #fca5a5; color: #b91c1c; }
        
        textarea { flex: 1; min-height: 180px; resize: vertical; direction: ltr; font-family: monospace; background: #f8fafc; font-size: 12px;}
        
        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }

        .ai-prompts { background: #f0fdf4; border: 1px dashed #22c55e; padding: 12px; border-radius: 8px; margin-bottom: 15px;}
        .ai-prompts p { margin: 0 0 8px 0; font-size: 12px; color: #166534; font-weight: bold; text-align: center;}
        .prompt-btns { display: flex; gap: 8px; }
        .prompt-btn { flex: 1; background: #fff; border: 1px solid #22c55e; color: #15803d; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 4px;}
        .prompt-btn:hover { background: #22c55e; color: #fff; }

        .export-buttons { display: flex; gap: 10px; margin-top: 5px; }
        .export-btn { background: #2563eb; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; flex: 1; }
        .export-btn:hover { background: #1d4ed8; transform: translateY(-1px);}
        .export-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none;}
        .video-export-btn { background: #f97316; }
        .video-export-btn:hover { background: #ea580c; }
        
        .preview-header { padding: 12px 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-size: 14px; font-weight: bold; color: #475569; display: flex; justify-content: space-between; align-items: center;}
        .tag { background: #e0e7ff; color: #4338ca; padding: 4px 10px; border-radius: 6px; font-size: 12px; transition: 0.3s; }
        .recording-indicator { background: #ef4444; color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; display: inline-flex; align-items: center; gap: 6px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        
        .video-preview-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #1a1a2e; overflow: auto; }
        #preview-frame { width: 100%; height: 100%; border: none; background: #fff; }
        
        .progress-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .progress-bar { width: 300px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 15px; }
        .progress-fill { height: 100%; background: #f97316; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="password-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f6f8; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div style="background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; text-align: center; width: 90%; max-width: 350px;">
            <h3 style="margin-top: 0; color: #1e293b;">🔒 حماية المنصة</h3>
            <p style="font-size: 13px; color: #475569; margin-bottom: 20px;">الرجاء إدخال كلمة المرور للوصول.</p>
            <div class="form-group" style="margin-bottom: 15px;">
                <input type="password" id="pass-input" placeholder="كلمة المرور..." style="text-align: center; letter-spacing: 2px;" onkeypress="if(event.key === 'Enter') checkPassword()">
            </div>
            <button onclick="checkPassword()" class="export-btn" style="width: 100%; padding: 10px; margin-top: 0;">تسجيل الدخول</button>
            <p id="pass-error" style="color: #ef4444; font-size: 12px; display: none; margin-top: 15px; font-weight: bold; margin-bottom: 0;">❌ كلمة المرور غير صحيحة!</p>
        </div>
    </div>

    <div class="header">
        <h2>🛠️ منصة تحويل الأكواد إلى PDF وفيديو</h2>
    </div>

    <div class="main-container">
        <div class="sidebar">
            
            <div class="ai-prompts">
                <p>🤖 نسخ أمر جاهز للذكاء الاصطناعي:</p>
                <div class="prompt-btns">
                    <button class="prompt-btn" onclick="copyPrompt('a4', this)">📄 بحث أكاديمي (A4)</button>
                    <button class="prompt-btn" onclick="copyPrompt('169', this)">🖥️ عرض تقديمي (16:9)</button>
                    <button class="prompt-btn" onclick="copyPrompt('video', this)">📱 فيديو جوال (9:16)</button>
                </div>
            </div>

            <div class="form-group">
                <label>اسم الملف المستخرج:</label>
                <input type="text" id="file-name" value="مستند_جديد" placeholder="اكتب اسم الملف هنا...">
            </div>

            <div class="row">
                <div class="form-group">
                    <label>مقاس الصفحة:</label>
                    <select id="format-select" onchange="updateTag()">
                        <option value="169">عرض تقديمي (16:9)</option>
                        <option value="a4">بحث / تقرير (A4)</option>
                        <option value="video">فيديو جوال (9:16)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>جودة الـ PDF:</label>
                    <select id="quality-select">
                        <option value="1">عادية</option>
                        <option value="2" selected>عالية</option>
                        <option value="3">ممتازة</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>مدة كل صفحة (ثانية) للفيديو:</label>
                <input type="number" id="page-duration" value="3" min="1" max="10" step="0.5">
                <small style="font-size: 10px; color: #666;">⏱️ مدة عرض كل صفحة قبل الانتقال للتالية</small>
            </div>

            <div class="form-group" style="flex: 1;">
                <div class="textarea-header">
                    <label style="margin:0;">كود الـ HTML (الصق هنا):</label>
                    <button class="clear-btn" onclick="clearCode()">🗑️ مسح الكود</button>
                </div>
                <textarea id="html-input" oninput="updatePreview()" placeholder="الصق الكود الذي أعطاك إياه الذكاء الاصطناعي هنا..."></textarea>
            </div>

            <div class="export-buttons">
                <button id="capture-btn" class="export-btn" onclick="exportToPDF()">استخراج كملف PDF 📥</button>
                <button id="video-btn" class="export-btn video-export-btn" onclick="exportToVideo()">استخراج كمقطع فيديو 🎬</button>
            </div>
        </div>

        <div class="preview-section">
            <div class="preview-header">
                <span>👁️ المعاينة المباشرة</span>
                <span class="tag" id="size-tag">الأبعاد: 1280 × 720</span>
            </div>
            <iframe id="preview-frame"></iframe>
        </div>
    </div>
    
    <div id="progress-overlay" class="progress-overlay">
        <div style="background: #1e293b; padding: 30px; border-radius: 12px; text-align: center; min-width: 300px;">
            <div style="font-size: 18px; margin-bottom: 15px;" id="progress-text">🎬 جاري تجهيز الفيديو...</div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <div style="margin-top: 15px; font-size: 12px; color: #94a3b8;" id="progress-detail">0%</div>
        </div>
    </div>

    <script>
        // --- دالة التحقق من كلمة المرور ---
        function checkPassword() {
            const input = document.getElementById('pass-input').value;
            const errorMsg = document.getElementById('pass-error');
            
            if (input === 'ayman') {
                document.getElementById('password-overlay').style.display = 'none';
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        }
        // -----------------------------------

        const prompts = {
            a4: `أنت مصمم وثائق HTML محترف. قم بإنشاء كود HTML كامل لبحث أكاديمي بالعربية وفق المواصفات التالية:

**عنوان البحث:** [اكتب العنوان هنا]
**المادة:** [مثال: فيزياء / كيمياء / رياضيات]
**الطالب:** [الاسم]
**المعلم:** [الاسم]
**الصف:** [مثال: أول ثانوي]
**العام الدراسي:** [مثال: 1447هـ / 2026م]
**عدد الصفحات المطلوبة:** [مثال: 5 صفحات]

**متطلبات تقنية صارمة جداً — لا تتجاوزها:**
1. يبدأ الكود بـ <html lang="ar" dir="rtl">.
2. استدعاء خطوط Google Fonts صراحةً (مثل Cairo أو Tajawal).
3. الـ body يحتوي على: display: block; direction: rtl; text-align: right; margin: 0; padding: 0; box-sizing: border-box;
4. كل صفحة تكون: <div class="page">. أبعادها: width: 794px; height: 1123px; overflow: hidden; position: relative; box-sizing: border-box;
5. **مهم جداً للنقاط:** لا تستخدم القوائم الافتراضية (ul, ol). للترقيم أو النقاط، استخدم عناصر <p> أو <div> عادية وأضف النقطة كجزء من النص هكذا: <p>• النقطة الأولى</p> أو <p>1- النقطة الأولى</p>.
6. ممنوع استخدام letter-spacing نهائياً.

**هيكل كل صفحة:**
صفحة 1: غلاف احترافي.
صفحة 2+: محتوى البحث.
صفحة أخيرة: المراجع.
نمط التصميم: احترافي وأنيق بألوان متناسقة.`,
            
            169: `أنت مصمم عروض HTML محترف. قم بإنشاء كود HTML كامل لعرض تقديمي بالعربية وفق المواصفات التالية:

**عنوان العرض:** [اكتب العنوان هنا]
**المادة / الموضوع:** [مثال: مشروع فيزياء / درس تاريخ]
**المقدِّم:** [الاسم]
**عدد الشرائح:** [مثال: 8 شرائح]

**متطلبات تقنية صارمة جداً — لا تتجاوزها:**
1. يبدأ الكود بـ <html lang="ar" dir="rtl">.
2. استدعاء خطوط Google Fonts صراحةً (مثل Cairo أو Tajawal).
3. الـ body يحتوي على: display: block; direction: rtl; text-align: right; margin: 0; padding: 0; box-sizing: border-box;
4. كل شريحة تكون: <div class="page">. أبعادها: width: 1280px; height: 720px; overflow: hidden; position: relative; box-sizing: border-box;
5. **مهم جداً للنقاط:** لا تستخدم القوائم الافتراضية (ul, ol). للترقيم أو النقاط، استخدم عناصر <p> أو <div> عادية وأضف النقطة كجزء من النص هكذا: <p>• النقطة الأولى</p> أو <p>1- النقطة الأولى</p>.
6. ممنوع استخدام letter-spacing نهائياً.

**هيكل الشرائح:**
شريحة 1: غلاف (عنوان كبير + اسم المقدِّم).
شرائح 2+: محتوى منظم.
نمط التصميم: حديث، خلفيات ملونة، نصوص واسعة. خطوط كبيرة وواضحة.`,

            video: `أنت مصمم محتوى فيديوهات قصيرة لمشاهدة الجوال. قم بإنشاء كود HTML كامل بمقاس (9:16) مع أنيميشن CSS جذاب.

**عنوان الفيديو:** [اكتب العنوان هنا]
**المحتوى الأساسي:** [اكتب النقاط الرئيسية التي تريد عرضها]

**متطلبات تقنية صارمة جداً — لا تتجاوزها:**
1. يبدأ الكود بـ <html lang="ar" dir="rtl">.
2. استدعاء خطوط Google Fonts (مثل Cairo أو Tajawal).
3. الـ body يحتوي على: display: flex; align-items: center; justify-content: center; direction: rtl; text-align: right; margin: 0; padding: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
4. كل عنصر محتوى يكون داخل <div class="slide">. أبعاده: width: 1080px; height: 1920px; overflow: hidden; position: relative; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; padding: 40px;
5. **استخدام أنيميشن CSS:** أضف أنيميشن fadeInUp لعناصر النص داخل كل شريحة:
   @keyframes fadeInUp {
       from { opacity: 0; transform: translateY(30px); }
       to { opacity: 1; transform: translateY(0); }
   }
   .slide h1, .slide h2, .slide p { animation: fadeInUp 0.8s ease-out forwards; opacity: 0; }
   .slide h1 { animation-delay: 0.1s; }
   .slide h2 { animation-delay: 0.3s; }
   .slide p { animation-delay: 0.5s; }
6. **مهم جداً للنقاط:** لا تستخدم القوائم الافتراضية (ul, ol). استخدم عناصر <p> أو <div> عادية وأضف النقطة كجزء من النص.

**الهيكل المطلوب:**
- شريحة 1: عنوان كبير ومثير + خلفية جذابة.
- شريحة 2-4: كل شريحة تحتوي على عنوان فرعي ونقطتين أو ثلاث نقاط رئيسية.
- شريحة أخيرة: خاتمة أو عبارة تحفيزية + أيقونة أو رمز.

نمط التصميم: عصري بألوان جذابة، نصوص كبيرة وواضحة، خلفيات متدرجة، ومسافات مريحة.`
        };

        function copyPrompt(type, btnElement) {
            navigator.clipboard.writeText(prompts[type]).then(() => {
                const originalText = btnElement.innerText;
                const originalBg = btnElement.style.background;
                const originalColor = btnElement.style.color;

                btnElement.innerText = "✅ تم النسخ!";
                btnElement.style.background = "#22c55e";
                btnElement.style.color = "#fff";

                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.style.background = originalBg;
                    btnElement.style.color = originalColor;
                }, 2000);
            });
        }

        function clearCode() {
            if(confirm("هل أنت متأكد من مسح الكود الحالي؟")) {
                document.getElementById('html-input').value = '';
                updatePreview();
            }
        }

        function updateTag() {
            const format = document.getElementById('format-select').value;
            const tag = document.getElementById('size-tag');
            if(format === 'a4') {
                tag.innerText = "الأبعاد: 794 × 1123 (A4)";
            } else if(format === 'video') {
                tag.innerText = "الأبعاد: 1080 × 1920 (9:16)";
            } else {
                tag.innerText = "الأبعاد: 1280 × 720 (16:9)";
            }
        }

        function updatePreview() {
            const code = document.getElementById('html-input').value;
            const iframe = document.getElementById('preview-frame');
            iframe.srcdoc = code;
        }

        // ---------- معالجة الصور (محفوظة كما هي) ----------
        async function urlToDataURL(url) {
            if (url && (url.startsWith('data:') || url.startsWith('blob:'))) return url;
            
            let absoluteUrl = url;
            try {
                if (!url.startsWith('http://') && !url.startsWith('https://') && !url.startsWith('//')) {
                    absoluteUrl = new URL(url, window.location.href).href;
                } else if (url.startsWith('//')) {
                    absoluteUrl = 'https:' + url;
                }
            } catch(e) {
                absoluteUrl = url;
            }
            
            const proxies = [null, 'https://corsproxy.io/?', 'https://api.allorigins.win/raw?url='];
            
            for (const proxy of proxies) {
                try {
                    let fetchUrl = absoluteUrl;
                    if (proxy) fetchUrl = proxy + encodeURIComponent(absoluteUrl);
                    const response = await fetch(fetchUrl, { mode: 'cors', credentials: 'omit' });
                    if (!response.ok) continue;
                    const blob = await response.blob();
                    return await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.onerror = () => resolve(null);
                        reader.readAsDataURL(blob);
                    });
                } catch (err) {
                    console.warn(`فشل الجلب`);
                }
            }
            
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        resolve(canvas.toDataURL('image/jpeg', 0.9));
                    } catch(e) { resolve(null); }
                };
                img.onerror = () => resolve(null);
                img.src = absoluteUrl;
                setTimeout(() => resolve(null), 5000);
            });
        }
        
        async function convertAllImagesToDataURLs(container) {
            const images = Array.from(container.querySelectorAll('img'));
            const promises = images.map(async (img) => {
                const src = img.getAttribute('src');
                if (!src || src.startsWith('data:')) return;
                const dataUrl = await urlToDataURL(src);
                if (dataUrl) img.setAttribute('src', dataUrl);
            });
            await Promise.all(promises);
        }
        
        // -------------------------------------------------
        async function exportToPDF() {
            const btn = document.getElementById('capture-btn');
            const code = document.getElementById('html-input').value;
            const fileName = document.getElementById('file-name').value || 'document';
            const qualityScale = parseInt(document.getElementById('quality-select').value);
            const formatType = document.getElementById('format-select').value;

            if (!code.trim()) { alert("الرجاء لصق الكود أولاً!"); return; }

            let docWidth, docHeight, pdfOrientation;
            if (formatType === 'a4') {
                docWidth = 794; docHeight = 1123; pdfOrientation = 'portrait';
            } else if (formatType === 'video') {
                docWidth = 1080; docHeight = 1920; pdfOrientation = 'portrait';
            } else { 
                docWidth = 1280; docHeight = 720; pdfOrientation = 'landscape';
            }

            btn.disabled = true;
            btn.innerText = `⏳ جاري تجهيز الصفحات...`;

            const hiddenContainer = document.createElement('div');
            hiddenContainer.dir = 'rtl'; 
            hiddenContainer.style.position = 'absolute';
            hiddenContainer.style.top = '0';
            hiddenContainer.style.left = '0';
            hiddenContainer.style.zIndex = '-9999';
            hiddenContainer.style.opacity = '0.01'; 
            hiddenContainer.style.pointerEvents = 'none';
            hiddenContainer.style.width = docWidth + 'px'; 
            hiddenContainer.innerHTML = code;
            
            const styleFix = document.createElement('style');
            styleFix.innerHTML = `ul { list-style-type: none !important; } * { box-sizing: border-box !important; letter-spacing: normal !important; }`;
            hiddenContainer.appendChild(styleFix);
            
            document.body.appendChild(hiddenContainer);

            try {
                await convertAllImagesToDataURLs(hiddenContainer);
                await document.fonts.ready;
                
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: pdfOrientation, unit: 'px', format: [docWidth, docHeight] });
                
                let pages = hiddenContainer.querySelectorAll('.page');
                if (pages.length === 0) pages = [hiddenContainer];
                
                for (let i = 0; i < pages.length; i++) {
                    btn.innerText = `📸 جاري تصوير الصفحة ${i+1} من ${pages.length}...`;
                    const canvas = await html2canvas(pages[i], {
                        scale: qualityScale,
                        useCORS: true,
                        width: docWidth,
                        height: docHeight,
                        backgroundColor: '#ffffff'
                    });
                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    if (i > 0) pdf.addPage([docWidth, docHeight], pdfOrientation);
                    pdf.addImage(imgData, 'JPEG', 0, 0, docWidth, docHeight);
                }
                
                pdf.save(`${fileName}.pdf`);
            } catch (error) {
                console.error(error);
                alert("حدث خطأ أثناء معالجة الملف.");
            } finally {
                document.body.removeChild(hiddenContainer);
                btn.disabled = false;
                btn.innerText = "استخراج كملف PDF 📥";
            }
        }

        // ---------- تسجيل الفيديو (يدعم المقاسين) ----------
        async function exportToVideo() {
            const videoBtn = document.getElementById('video-btn');
            const fileName = document.getElementById('file-name').value || 'video';
            const formatType = document.getElementById('format-select').value;
            const durationPerPage = parseFloat(document.getElementById('page-duration').value) || 3;
            const code = document.getElementById('html-input').value;
            
            if (!code.trim()) { alert("الرجاء لصق الكود أولاً!"); return; }
            
            // تحديد الأبعاد حسب المقاس المختار
            let pageWidth, pageHeight;
            if (formatType === 'a4') {
                pageWidth = 794; pageHeight = 1123;
            } else if (formatType === 'video') {
                pageWidth = 1080; pageHeight = 1920;
            } else {
                pageWidth = 1280; pageHeight = 720;
            }
            
            const totalFrames = Math.ceil(30 * durationPerPage); // 30fps * مدة الصفحة
            const framesPerPage = totalFrames;
            
            // إظهار شريط التقدم
            const overlay = document.getElementById('progress-overlay');
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            const progressDetail = document.getElementById('progress-detail');
            overlay.style.display = 'flex';
            
            videoBtn.disabled = true;
            
            try {
                // تجهيز الحاوية المخفية
                const container = document.createElement('div');
                container.dir = 'rtl';
                container.style.position = 'absolute';
                container.style.top = '-9999px';
                container.style.left = '-9999px';
                container.style.width = pageWidth + 'px';
                container.innerHTML = code;
                
                const styleFix = document.createElement('style');
                styleFix.innerHTML = `* { box-sizing: border-box !important; } body { margin: 0; padding: 0; } .page, .slide { width: ${pageWidth}px !important; height: ${pageHeight}px !important; }`;
                container.appendChild(styleFix);
                document.body.appendChild(container);
                
                // تحويل الصور
                progressText.innerText = "🖼️ تجهيز الصور...";
                await convertAllImagesToDataURLs(container);
                
                // الحصول على جميع الصفحات/الشرائح
                let pages = Array.from(container.querySelectorAll('.page, .slide'));
                if (pages.length === 0) pages = [container];
                
                progressText.innerText = `🎬 تجهيز ${pages.length} صفحة...`;
                
                // Canvas للتجميع
                const canvas = document.createElement('canvas');
                canvas.width = pageWidth;
                canvas.height = pageHeight;
                const ctx = canvas.getContext('2d');
                
                // إعداد تسجيل الفيديو
                const stream = canvas.captureStream(30); // 30fps
                const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                const chunks = [];
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };
                
                const videoPromise = new Promise((resolve) => {
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        resolve(blob);
                    };
                });
                
                mediaRecorder.start();
                
                // تصوير كل صفحة
                let totalFramesRendered = 0;
                const totalFramesNeeded = pages.length * framesPerPage;
                
                for (let pageIdx = 0; pageIdx < pages.length; pageIdx++) {
                    progressText.innerText = `📸 تصوير الصفحة ${pageIdx + 1} من ${pages.length}`;
                    
                    // تصوير الصفحة باستخدام html2canvas
                    const imgCanvas = await html2canvas(pages[pageIdx], {
                        scale: 2,
                        useCORS: true,
                        width: pageWidth,
                        height: pageHeight,
                        backgroundColor: '#ffffff'
                    });
                    
                    // عرض كل إطار في الفيديو
                    for (let frame = 0; frame < framesPerPage; frame++) {
                        ctx.clearRect(0, 0, pageWidth, pageHeight);
                        ctx.drawImage(imgCanvas, 0, 0, pageWidth, pageHeight);
                        
                        totalFramesRendered++;
                        const percent = Math.floor((totalFramesRendered / totalFramesNeeded) * 100);
                        progressFill.style.width = percent + '%';
                        progressDetail.innerText = percent + '%';
                        
                        // انتظار للإطار التالي (30fps يعني ~33ms)
                        await new Promise(r => setTimeout(r, 33));
                    }
                }
                
                // إنهاء التسجيل
                mediaRecorder.stop();
                const videoBlob = await videoPromise;
                
                // حفظ الفيديو
                const url = URL.createObjectURL(videoBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${fileName}.webm`;
                a.click();
                URL.revokeObjectURL(url);
                
                alert("✅ تم حفظ الفيديو بنجاح!");
                
            } catch (error) {
                console.error("خطأ في تصدير الفيديو:", error);
                alert("حدث خطأ: " + error.message);
            } finally {
                // تنظيف
                const container = document.querySelector('div[style*="-9999px"]');
                if (container) container.remove();
                overlay.style.display = 'none';
                videoBtn.disabled = false;
            }
        }
    </script>
